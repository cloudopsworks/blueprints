name: Save Rust Artifacts
author: cloudopsworks
description: Save Rust artifacts to the artifacts store
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'

runs:
  using: 'composite'
  steps:
    # Get pipeline conf
    - name: Get pipeline zip packaging globs
      id: zip_globs
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".zipGlobs[] | strenv(INPUTS_SOURCE_PATH) + \"/\" + ." "./${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get pipeline zip packaging exclude globs
      id: exclude_globs
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".excludeGlobs[] | \"!\" + strenv(INPUTS_SOURCE_PATH) + \"/\" + ." "./${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Copy Release to bin
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        STEPS_ZIP_GLOBS_RESULT: ${{ steps.zip_globs.outputs.result }}
      run: |
        mkdir -p "${INPUTS_SOURCE_PATH}/bin/"
        find "${STEPS_ZIP_GLOBS_RESULT}" -type f -maxdepth 0 -exec cp -pv {} "${INPUTS_SOURCE_PATH}/bin/" \;

    # Perform of upload of artfiacts for Rust
    - name: Upload Artifacts to workflow
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifacts_name }}
        path: |
          ${{ inputs.source_path }}/bin/**
          !${{ inputs.source_path }}/*.d
          !${{ inputs.source_path }}/*.rlib
          ${{ steps.zip_globs.outputs.result }}
          ${{ steps.exclude_globs.outputs.result }}
        retention-days: 1
        include-hidden-files: true
        compression-level: '1' #fast
        overwrite: 'true'

    # Perform of upload of sources
    - name: Upload Sources to workflow
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.sources_artifacts_name }}
        path: |
          ${{ inputs.source_path }}/**
          !${{ inputs.source_path }}/target/**
          !${{ inputs.source_path }}/test-results/**
          ${{ steps.exclude_globs.outputs.result }}
        retention-days: 1
        include-hidden-files: true
        compression-level: '3' #mid-fast

    # Perform of upload of target generated sources
    - name: Upload Sources to workflow
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.sources_artifacts_name }}_target
        path: |
          ${{ inputs.source_path }}/test-results/**
          ${{ inputs.source_path }}/target/**
          ${{ steps.exclude_globs.outputs.result }}
        retention-days: 1
        include-hidden-files: true
        compression-level: '3' #mid-fast
