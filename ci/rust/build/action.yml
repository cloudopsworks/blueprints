name: Build Rust Sources
author: cloudopsworks
description: Build Rust sources and save artifacts
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true
outputs:
  rust_version:
    description: 'The Rust version to use for the build'
    value: ${{ steps.rust_version.outputs.result }}
  rust_dist:
    description: 'The Rust distribution to use for the build'
    value: ${{ steps.rust_dist.outputs.result }}
  rust_arch:
    description: 'The Rust architecture to use for the build'
    value: ${{ steps.rust_arch.outputs.result }}
  rust_image_variant:
    description: 'The Rust image variant to use for the build'
    value: ${{ steps.rust_image_variant.outputs.result }}
  rust_components:
    description: 'The Rust Component list as comma separated'
    value: ${{ steps.rust_components.outputs.result }}
  rust_goreleaser:
    description: 'The GoReleaser configuration to use for the build'
    value: ${{ steps.rust_goreleaser.outputs.result }}
  semver:
    description: 'The semver version'
    value: ${{ steps.semver.outputs.result }}
  package_name:
    description: 'The package name'
    value: ${{ steps.package_name.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Check tools and install
      shell: bash
      run: |
        echo "::group::Check Tools"
        sudo apt-get update
        which make || sudo apt-get install -y make
        which gh || sudo apt-get install -y gh
        echo "::endgroup::"

    # Get pipeline conf Rust version Defaults to 1.87
    - name: Get pipeline Rust version
      id: rust_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.version // \"stable\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get pipeline Rust components
      id: rust_components
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.components // [] | join(\",\")" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf Rust dist defaults to linux (supported: linux windows darwin)
    - name: Get pipeline Rust dist
      id: rust_dist
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.dist // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf Rust arch defaults to x64
    - name: Get pipeline Rust arch
      id: rust_arch
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.arch // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf Rust image variant defaults to alpine
    - name: Get pipeline Rust image variant
      id: rust_image_variant
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.image_variant // \"alpine\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # GoReleaser configuration, default is false, if set to true, .goreleaser.yaml should be present in the source code root
    - name: Get pipeline GoReleaser configuration
      id: rust_goreleaser
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".rust.goreleaser // \"false\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get package name from the Cargo.toml file
    - name: Get package name
      id: package_name
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -otoml ".package.name" "./${INPUTS_SOURCE_PATH}/Cargo.toml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Rust Options
    - name: Get Rust Build options
      id: build_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".build_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Rust Test Options
    - name: Get Rust Build options
      id: test_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".test_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get DependencyTrack project type configuration, default is null
    - name: Get Pipeline conf DependencyTrack Project type
      id: dtrack_project_type
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dependencyTrack.type // \"application\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Rust comes in GitHub Actions, so we can use the latest version
    - name: Setup Rust SDK
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ steps.rust_version.outputs.result }}
        components: ${{ steps.rust_components.outputs.result }}
        rust-src-dir: ${{ inputs.source_path }}
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    # Rust comes in GitHub Actions, so we can use the latest version
    - name: Install required Pipeline Cargo Components
      shell: bash
      run: |
        echo "::group::Install required Pipeline Cargo Components"
        cargo install cargo-tarpaulin cargo-cyclonedx toml-cli2 cargo-edit
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Install gcc toolchain
      shell: bash
      run: |
        echo "::group::Install GCC Toolchain"
        which cmake || sudo apt-get install -y cmake
        which g++ || sudo apt-get install -y g++
        which pkg-config || sudo apt-get install -y pkg-config
        which jq || sudo apt-get install -y jq
        sudo apt-get install -y libcurl4-openssl-dev libelf-dev libdw-dev binutils-dev libiberty-dev
        echo "::endgroup::"

    - name: Add Rust Target - Cross Compile
      if: ${{ steps.rust_dist.outputs.result != '' && steps.rust_arch.outputs.result != '' }}
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        STEPS_RUST_ARCH_RESULT: ${{ steps.rust_arch.outputs.result }}
        STEPS_RUST_DIST_RESULT: ${{ steps.rust_dist.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        RUNNER_OS: ${{ runner.os }}
        EXPR_HASHFILES_CARGO_LOCK: ${{ hashFiles('**/Cargo.lock') }}
      run: |
        echo "::group::Add Rust Target"
        rustup target add ${STEPS_RUST_ARCH_RESULT}-${STEPS_RUST_DIST_RESULT}
        echo "::endgroup::"

# Cache provided by setup-rust
#    - name: Cache
#      uses: actions/cache@v5
#      with:
#        path: |
#          ~/.cargo/registry
#          ~/.cargo/git
#          ${INPUTS_SOURCE_PATH}/target
#        key: ${RUNNER_OS}-cargo-${EXPR_HASHFILES_CARGO_LOCK}

    # Versioning SET
    - name: Version SET
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Rust Version SET"
        make version
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Version Capture
      working-directory: ${{ inputs.source_path }}
      id: semver
      shell: bash
      run: |
        echo "result=$(cat VERSION)" >> $GITHUB_OUTPUT

    # Test the code!
    - name: Test Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Rust Test"
        mkdir -p test-results
        cargo test --no-fail-fast ${STEPS_BUILD_OPTS_RESULT} -- --test-threads=2  ${STEPS_TEST_OPTS_RESULT} | tee test-results/test.log
        cargo tarpaulin --skip-clean --profile=test --out Html --out Xml --out Lcov --output-dir test-results/
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}
        STEPS_TEST_OPTS_RESULT: ${{ steps.test_opts.outputs.result }}

    - name: SBOM Generation for Dtrack
      shell: bash
      working-directory: ${{ inputs.source_path }}
      env:
        EXPR_STEPS_RUST_ARCH_OUTPUTS_RESULT_FORMAT_TARGET_0_1: ${{ steps.rust_arch.outputs.result != '' && format('--target {0}-{1}', steps.rust_arch.outputs.result, steps.rust_dist.outputs.result) || '' }}
      run: |
        echo "::group::SBOM Generation"
        cargo cyclonedx --format xml --all-features --override-filename bom ${EXPR_STEPS_RUST_ARCH_OUTPUTS_RESULT_FORMAT_TARGET_0_1}
        echo "::endgroup::"

    # Build the code!
    - name: Build Default Target Code
      if: ${{ steps.rust_dist.outputs.result == '' || steps.rust_arch.outputs.result == '' }}
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Rust Default Cargo Build"
        cargo build --release ${STEPS_BUILD_OPTS_RESULT} --target-dir ./target
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}

    # Build the targetted code!
    - name: Build Targetted Code (Cross Compile)
      if: ${{ steps.rust_dist.outputs.result != '' && steps.rust_arch.outputs.result != '' }}
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Rust Cargo Build - Cross Compile"
        cargo build --release --target ${STEPS_RUST_ARCH_RESULT}-${STEPS_RUST_DIST_RESULT} ${STEPS_BUILD_OPTS_RESULT}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        STEPS_RUST_ARCH_RESULT: ${{ steps.rust_arch.outputs.result }}
        STEPS_RUST_DIST_RESULT: ${{ steps.rust_dist.outputs.result }}
        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}
