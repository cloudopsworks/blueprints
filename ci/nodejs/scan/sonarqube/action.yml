name: Sonarqube Scan NodeJS
author: cloudopsworks
description: This action scans the Node.js code using Sonarqube
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  sonarqube_url:
    description: 'The Sonarqube URL'
    required: true
  sonarqube_token:
    description: 'The Sonarqube token'
    required: true
  sonarqube_project_key:
    description: 'The Sonarqube project key'
    required: true
  semver:
    description: 'The Semver version'
    required: true
  token:
    description: 'The Github token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get Repository Owner from inputs-global.yaml
      id: repo_owner
      shell: bash
      env:
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".repository_owner // strenv(GITHUB_REPOSITORY_OWNER)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonnar Scanner version, if needed to be adjusted, allways defaults to latest
      id: sonar_scanner_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.scanner_version // \"latest\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar sources form inputs-global.yaml
      id: source_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.sources_path // \".\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar libraries from inputs-global.yaml
      id: libraries_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.libraries_path // \"**/node_modules/**\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar tests from inputs-global.yaml (defaults to source_path)
      id: tests_path
      shell: bash
      env:
        STEPS_SOURCE_PATH_RESULT: ${{ steps.source_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_path // strenv(STEPS_SOURCE_PATH_RESULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar test inclusions from inputs-global.yaml
      id: test_inclusions_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_inclusions // \"**/*.test.js,**/*.spec.js\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar test libraries from inputs-global.yaml
      id: test_libraries_path
      shell: bash
      env:
        STEPS_LIBRARIES_PATH_RESULT: ${{ steps.libraries_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_libraries // strenv(STEPS_LIBRARIES_PATH_RESULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar extra exclusions from inputs-global.yaml
      id: extra_exclusions_paths
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.extra_exclusions // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar exclusions from inputs-global.yaml
      id: exclusions_paths
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.exclusions // \"node_modules/**,coverage/**,test/**,tests/**,charts/**,tronador/**,dist/**,build/**,apifiles/**/*\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get if sonar branch setting is disabled
      id: branch_disabled
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.branch_disabled and true" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Scan the code
    - name: Sonar Scan
      uses: sonarsource/sonarqube-scan-action@v8
      env:
        SONAR_TOKEN: ${{ inputs.sonarqube_token }}
        SONAR_HOST_URL: ${{ inputs.sonarqube_url }}
      with:
        projectBaseDir: ${{ inputs.source_path }}
        args: >
          -Dsonar.projectKey=${{ contains(inputs.sonarqube_url, 'sonarcloud.io') && format('{0}_{1}',steps.repo_owner.outputs.result,inputs.sonarqube_project_key) || inputs.sonarqube_project_key }}
          -Dsonar.projectVersion=${{ inputs.semver }}
          -Dsonar.sources=${{ steps.source_path.outputs.result }}
          -Dsonar.tests=${{ steps.tests_path.outputs.result }}
          -Dsonar.test.inclusions=${{ steps.test_inclusions_path.outputs.result }}
          -Dsonar.exclusions=${{ steps.extra_exclusions_paths.outputs.result == '' && steps.exclusions_paths.outputs.result || format('{0},{1}',steps.exclusions_paths.outputs.result,steps.extra_exclusions_paths.outputs.result) }}
          -Dsonar.test.exclusions=${{ steps.extra_exclusions_paths.outputs.result == '' && steps.exclusions_paths.outputs.result || format('{0},{1}',steps.exclusions_paths.outputs.result,steps.extra_exclusions_paths.outputs.result) }}
          -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
          -Dsonar.language=javascript
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.lang.patterns.openapi=openapi
          ${{ contains(inputs.sonarqube_url, 'sonarcloud.io') && format('-Dsonar.organization={0}',steps.repo_owner.outputs.result) || ' ' }}
          ${{ steps.branch_disabled.outputs.result != 'true' && format('-Dsonar.branch.name={0}',github.ref_name) || ' ' }}
