name: Build NodeJS Sources
author: cloudopsworks
description: Build NodeJS sources and save artifacts, requires ci/nodejs/config/action.yml
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true
  has_preview:
    description: 'The preview flag will process only for preview builds'
    required: false
    default: 'false'
  install_command:
    description: 'The install command'
    required: true
  build_command:
    description: 'The build command'
    required: true
  node_extra_env:
    description: 'The extra environment variables'
    required: true
  observability_enabled:
    description: 'The observability flag'
    required: false
    default: 'false'
  observability_agent:
    description: 'The observability agent'
    required: false
    default: 'xray'

outputs:
  node_version:
    description: 'The NodeJS version to use for the build'
    value: ${{ steps.node_version.outputs.result }}
  node_dist:
    description: 'The NodeJS distribution to use for the build'
    value: ${{ steps.node_dist.outputs.result }}
  node_image_variant:
    description: 'The NodeJS image variant to use for the build'
    value: ${{ steps.node_image_variant.outputs.result }}
  semver:
    description: 'The semver version'
    value: ${{ steps.semver.outputs.result }}
  package_name:
    description: 'The package name'
    value: ${{ steps.package_name.outputs.result }}

runs:
  using: 'composite'
  steps:
    # Get onwer from inputs-global.yaml
    - name: Get pipeline owner
      id: repo_owner
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq eval ".repository_owner // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf node version
    - name: Get pipeline node version
      id: node_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq eval ".node.version // \"24\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf node dist
    - name: Get pipeline node dist
      id: node_dist
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq eval ".node.dist // \"adopt\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf java image variant defaults to alpine
    - name: Get pipeline NodeJS image variant
      id: node_image_variant
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".node.image_variant // \"alpine\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf
    - name: Get pipeline zip packaging globs
      id: zip_globs_line
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".zipGlobs[]" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml" | tr '\n' ' ')
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf
    - name: Get pipeline zip packaging exclude globs
      id: exclude_globs
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".excludeGlobs[] | \"!\" + ." "./${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf
    - name: Get pipeline zip packaging exclude globs
      id: raw_exclude_globs
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".excludeGlobs[]" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get Package Name from package.json
    - name: Get package Name
      id: package_name
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -oj -r ".name" "${INPUTS_SOURCE_PATH}/package.json")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Setup Node JS for builds with version provided
    - name: Set Node Version
      uses: actions/setup-node@v6
      with:
        node-version: "${{ steps.node_version.outputs.result }}"
        check-latest: true
        token: ${{ inputs.token }}

    # Cache all NPM packages
    - name: Cache NPM packages
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json','**/npm-shrinkwrap.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    # Versioning SET
    - name: Version SET
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Node Version SET"
        make version
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Version Capture
      working-directory: ${{ inputs.source_path }}
      id: semver
      shell: bash
      run: |
        echo "result=$(cat VERSION)" >> $GITHUB_OUTPUT

    # Edit package.json in order to include repository for automatic linking
    - name: Package.JSON - REPO auto link
      shell: bash
      env:
        GITHUB_REPOSITORYURL: ${{ github.repositoryUrl }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -oj -i ".repository.type=\"git\"|.repository.url=strenv(GITHUB_REPOSITORYURL)" "${INPUTS_SOURCE_PATH}/package.json")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Install nyc jest and mocha globally
    - name: Install Global Dependencies
      shell: bash
      run: |
        echo "::group::Install Global Dependencies"
        npm install -g nyc@18.0.0 jest@30.2.0 mocha@11.7.5
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    # NPM config registry setup
    - name: NPM Config Registry Setup
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::NPM Config Registry Setup"
        npm config --location=project set "//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN"
        npm config --location=project set "@${STEPS_REPO_OWNER_RESULT}:registry=https://npm.pkg.github.com/"
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        STEPS_REPO_OWNER_RESULT: ${{ steps.repo_owner.outputs.result }}

    # Build the code!
    - name: Install Dependencies
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::NPM Install"
        ${INPUTS_NODE_EXTRA_ENV} ${INPUTS_INSTALL_COMMAND}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        INPUTS_NODE_EXTRA_ENV: ${{ inputs.node_extra_env }}
        INPUTS_INSTALL_COMMAND: ${{ inputs.install_command }}

    - name: Install AWS open telemetry
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'xray' }}
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Install AWS Open Telemetry"
        npm install @aws/aws-distro-opentelemetry-node-autoinstrumentation@0.9.0
        echo "::endgroup::"

    # Build the code! build target MUST be defined in package.json
    - name: Run NPM Build
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::NPM Build"
        ${INPUTS_NODE_EXTRA_ENV} ${INPUTS_BUILD_COMMAND}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        INPUTS_NODE_EXTRA_ENV: ${{ inputs.node_extra_env }}
        INPUTS_BUILD_COMMAND: ${{ inputs.build_command }}

    # Test the code
    - name: Test Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::NPM Test"
        CI=true DISPLAY=:99 ${INPUTS_NODE_EXTRA_ENV} nyc --reporter=html --reporter=lcov --reporter=text-summary --reporter=cobertura -- npm test --if-present --no-watch --no-progress --code-coverage --browsers=ChromeHeadless
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        INPUTS_NODE_EXTRA_ENV: ${{ inputs.node_extra_env }}

    # SBOM generation
    - name: SBOM Generation for Dtrack
      shell: bash
      working-directory: ${{ inputs.source_path }}
      run: |
        echo "::group::SBOM Generation for Dtrack"
        npx @cyclonedx/cyclonedx-npm --output-format XML -o bom.xml
        echo "::endgroup::"

    # Removal of .npmrc file for security reasons
    - name: Remove .npmrc file
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Remove .npmrc file"
        [ -f .npmrc ] && rm -f .npmrc
        echo "::endgroup::"
