name: Deploy Node.js Component
author: cloudopsworks
description: Deploy Node.js Component to NPM repository
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true

runs:
  using: 'composite'
  steps:
    # Get if this is a library project
    - name: Get pipeline is Library
      id: is_library
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e "(.isLibrary or .is_library) and true" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Pipeline Library destination Registry
      id: library_registry
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".npm.registry // \"https://npm.pkg.github.com\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Pipeline Library Registry strategy
      id: library_strategy
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".npm.strategy // \"all\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Pipeline Library access type
      id: library_access
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".npm.access // \"restricted\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Deploy Code to Registry
    - name: Deploy Code to Registy
      if: ${{ steps.is_library.outputs.result == 'true' }}
      uses: JS-DevTools/npm-publish@v3
      with:
        package: ${{ inputs.source_path }}
        token: ${{ inputs.token }}
        registry: "${{ steps.library_registry.outputs.result }}"
        strategy: "${{ steps.library_strategy.outputs.result }}"
        access: "${{ steps.library_access.outputs.result }}"
