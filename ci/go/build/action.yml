name: Build GoLang Sources
author: cloudopsworks
description: Build GoLang sources and save artifacts
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true
outputs:
  golang_version:
    description: 'The GoLang version to use for the build'
    value: ${{ steps.golang_version.outputs.result }}
  golang_dist:
    description: 'The GoLang distribution to use for the build'
    value: ${{ steps.golang_dist.outputs.result }}
  golang_arch:
    description: 'The GoLang architecture to use for the build'
    value: ${{ steps.golang_arch.outputs.result }}
  golang_image_variant:
    description: 'The GoLang image variant to use for the build'
    value: ${{ steps.golang_image_variant.outputs.result }}
  golang_main_file:
    description: 'The GoLang main file to use for the build'
    value: ${{ steps.main_file.outputs.result }}
  golang_goreleaser:
    description: 'The GoReleaser configuration to use for the build'
    value: ${{ steps.golang_goreleaser.outputs.result }}
  semver:
    description: 'The semver version'
    value: ${{ steps.semver.outputs.result }}
  package_name:
    description: 'The package name'
    value: ${{ steps.package_name_config.outputs.result != '' && steps.package_name_config.outputs.result || steps.package_name.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Check tools and install
      shell: bash
      run: |
        echo "::group::Check Tools"
        sudo apt-get update
        which make || sudo apt-get install -y make
        which gh || sudo apt-get install -y gh
        echo "::endgroup::"

    # Get pipeline conf GoLang version Defaults to 1.23
    - name: Get pipeline GoLang version
      id: golang_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.version // \"1.25\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf GoLang dist defaults to linux (supported: linux windows darwin)
    - name: Get pipeline GoLang dist
      id: golang_dist
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.dist // \"linux\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf GoLang arch defaults to x64
    - name: Get pipeline GoLang arch
      id: golang_arch
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.arch // \"amd64\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf GoLang image variant defaults to alpine
    - name: Get pipeline GoLang image variant
      id: golang_image_variant
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.image_variant // \"alpine\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf GoLang main file defaults to main.go
    - name: Get pipeline GoLang main file
      id: main_file
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.main_file // \"main.go\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf GoLang if CGO is disabled or not
    - name: Get pipeline GoLang main file
      id: disable_cgo
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.disable_cgo // \"false\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # GoReleaser configuration, default is false, if set to true, .goreleaser.yaml should be present in the source code root
    - name: Get pipeline GoReleaser configuration
      id: golang_goreleaser
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".golang.goreleaser // \"false\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Check GoReleaser config with releaser settings for this pipeline
      shell: bash
      working-directory: ${{ inputs.source_path }}
      if: steps.golang_goreleaser.outputs.result == 'true'
      continue-on-error: false
      run: |
        #find out file to be modified: goreleaser.yaml or .goreleaser.yaml or .goreleaser.yml or goreleaser.yml
        if [ -f "goreleaser.yaml" ]; then
          CONFIG_FILE="goreleaser.yaml"
        elif [ -f ".goreleaser.yaml" ]; then
          CONFIG_FILE=".goreleaser.yaml"
        elif [ -f ".goreleaser.yml" ]; then
          CONFIG_FILE=".goreleaser.yml"
        elif [ -f "goreleaser.yml" ]; then
          CONFIG_FILE="goreleaser.yml"
        else
          echo "No GoReleaser config file found"
          echo "::error::No GoReleaser config file found in project, expected one of goreleaser.yaml, .goreleaser.yaml, .goreleaser.yml or goreleaser.yml"
          exit 1
        fi
        # validate in $CONFIG_FILE .release.draft not set or false
        # validate in $CONFIG_FILE .release.use_existing_draft is set and true
        # if not, set .release.draft to false and .release.use_existing_draft FAIL exit 1
        DRAFT=$(yq e ".release.draft // false" "$CONFIG_FILE")
        USE_EXISTING_DRAFT=$(yq e ".release.use_existing_draft // false" "$CONFIG_FILE")
        if [ "$DRAFT" != "false" ] || [ "$USE_EXISTING_DRAFT" != "true" ]; then
          echo "::error::GoReleaser config file $CONFIG_FILE has invalid release settings for this pipeline, expected .release.draft to be false and .release.use_existing_draft to be true"
          exit 1
        fi

    - name: Get Package Name from configuration
      id: package_name_config
      shell: bash
      env:
          INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
          RET=$(yq e ".golang.package_name // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
          echo "result=${RET}" >> $GITHUB_OUTPUT

    # Get the Package name from go.mod
    - name: Get Package name
      id: package_name
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        # Check if go.mod exists
        if [ ! -f "go.mod" ]; then
          echo "Error: go.mod file not found in current directory" >&2
          exit 1
        fi

        # Extract the module name using grep and sed
        # 1. Use grep to find the line starting with "module "
        # 2. Use sed to extract just the module name part
        # 3. Use sed again to replace "/" with "-"
        module_name=$(grep -m 1 "^module " go.mod | sed 's/^module //' | sed 's/\//-/g')

        # Check if we successfully extracted a module name
        if [ -z "$module_name" ]; then
          echo "Error: Could not find module declaration in go.mod" >&2
          exit 1
        fi
        echo "result=$module_name" >> $GITHUB_OUTPUT

    # Get from global inputs the custom Go Options
    - name: Get Go options
      id: build_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".build_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get DependencyTrack project type configuration, default is null
    - name: Get Pipeline conf DependencyTrack Project type
      id: dtrack_project_type
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dependencyTrack.type // \"application\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Setup GoLang GoLang SDK for builds
    - name: Set GoLang SDK
      uses: actions/setup-go@v6
      with:
        token: ${{ inputs.token }}
        go-version: "${{ steps.golang_version.outputs.result }}"
        check-latest: true
        cache-dependency-path: "**/*.sum"

    # Versioning SET
    - name: Version SET
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Go Version SET"
        make version
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Version Capture
      working-directory: ${{ inputs.source_path }}
      id: semver
      shell: bash
      run: |
        echo "result=$(cat VERSION)" >> $GITHUB_OUTPUT

    # Build the code!
    - name: Build Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Go Build"
        bash -c "GOOS=${STEPS_GOLANG_DIST_RESULT} GOARCH=${STEPS_GOLANG_ARCH_RESULT} ${STEPS_BUILD_OPTS_RESULT} ${EXPR_STEPS_DISABLE_CGO_OUTPUTS_RESULT_TRUE_CGO_ENABLE} go build -o bin/${STEPS_PACKAGE_NAME_RESULT} ${STEPS_MAIN_FILE_RESULT}"
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        STEPS_GOLANG_DIST_RESULT: ${{ steps.golang_dist.outputs.result }}
        STEPS_GOLANG_ARCH_RESULT: ${{ steps.golang_arch.outputs.result }}
        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}
        EXPR_STEPS_DISABLE_CGO_OUTPUTS_RESULT_TRUE_CGO_ENABLE: ${{ steps.disable_cgo.outputs.result == 'true' && 'CGO_ENABLED=0' || '' }}
        STEPS_PACKAGE_NAME_RESULT: ${{ steps.package_name_config.outputs.result != '' && steps.package_name_config.outputs.result || steps.package_name.outputs.result }}
        STEPS_MAIN_FILE_RESULT: ${{ steps.main_file.outputs.result }}

    # Test the code!
    - name: Test Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Go Test"
        mkdir -p test-results
        bash -c "GOOS=${STEPS_GOLANG_DIST_RESULT} GOARCH=${STEPS_GOLANG_ARCH_RESULT} ${STEPS_BUILD_OPTS_RESULT} go test -coverprofile=test-results/coverage.out ./..."
        bash -c "GOOS=${STEPS_GOLANG_DIST_RESULT} GOARCH=${STEPS_GOLANG_ARCH_RESULT} ${STEPS_BUILD_OPTS_RESULT} go tool cover -html=test-results/coverage.out -o test-results/coverage.html"
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        STEPS_GOLANG_DIST_RESULT: ${{ steps.golang_dist.outputs.result }}
        STEPS_GOLANG_ARCH_RESULT: ${{ steps.golang_arch.outputs.result }}
        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}

    - name: Install CycloneDX Go Module SBOM Generator
      id: sbom_download
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::SBOM Download"
        go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
        echo "::endgroup::"

    - name: SBOM Generation
      if: steps.sbom_download.outcome == 'success'
      shell: bash
      working-directory: ${{ inputs.source_path }}
      continue-on-error: true
      env:
        STEPS_GOLANG_DIST_RESULT: ${{ steps.golang_dist.outputs.result }}
        STEPS_GOLANG_ARCH_RESULT: ${{ steps.golang_arch.outputs.result }}
        STEPS_MAIN_FILE_RESULT: ${{ steps.main_file.outputs.result }}
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        echo "::group::SBOM Generation"
        bash -c "GOOS=${STEPS_GOLANG_DIST_RESULT} GOARCH=${STEPS_GOLANG_ARCH_RESULT} cyclonedx-gomod app -licenses -packages -output bom.xml -main $(dirname ${STEPS_MAIN_FILE_RESULT})"
        echo "::endgroup::"
