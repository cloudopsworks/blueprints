name: Build Java Sources
author: cloudopsworks
description: Build Java sources and save artifacts
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true
outputs:
  java_version:
    description: 'The Java version to use for the build'
    value: ${{ steps.java_version.outputs.result }}
  java_dist:
    description: 'The Java distribution to use for the build'
    value: ${{ steps.java_dist.outputs.result }}
  java_image_variant:
    description: 'The Java image variant to use for the build'
    value: ${{ steps.java_image_variant.outputs.result }}
  semver:
    description: 'The semver version'
    value: ${{ steps.semver.outputs.result }}
  package_name:
    description: 'The package name'
    value: ${{ steps.package_name.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Check tools and install
      shell: bash
      run: |
        echo "::group::Check Tools"
        sudo apt-get update
        which make || sudo apt-get install -y make
        which gh || sudo apt-get install -y gh
        echo "::endgroup::"

    # Get pipeline conf java version Defaults to 21
    - name: Get pipeline Java version
      id: java_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".java.version // \"25\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf java dist defaults to temurin (adopt is deprecated)
    - name: Get pipeline Java dist
      id: java_dist
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".java.dist // \"temurin\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf java image variant defaults to alpine
    - name: Get pipeline Java image variant
      id: java_image_variant
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".java.image_variant // \"alpine\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get the Package name from pom.xml (in the form of groupId.artifactId)
    - name: Get Package name
      id: package_name
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -oy ".project.groupId + \".\" + .project.artifactId" "${INPUTS_SOURCE_PATH}/pom.xml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Maven Options
    - name: Get Maven options
      id: maven_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".maven_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get DependencyTrack project type configuration, default is null
    - name: Get Pipeline conf DependencyTrack Project type
      id: dtrack_project_type
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dependencyTrack.type // \"application\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Setup Java JDK for builds
    - name: Set JDK
      uses: actions/setup-java@v4
      with:
        java-version: "${{ steps.java_version.outputs.result }}"
        distribution: "${{ steps.java_dist.outputs.result }}"

    # Setup Maven for builds
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.9

    # Cache all maven packages
    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    # Versioning SET
    - name: Version SET
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Maven Version SET"
        make version
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Version Capture
      working-directory: ${{ inputs.source_path }}
      id: semver
      shell: bash
      run: |
        echo "result=$(cat VERSION)" >> $GITHUB_OUTPUT

    # Build the code!
    - name: Build Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Maven Build"
        MAVEN_OPTS="$MAVEN_OPTS ${STEPS_MAVEN_OPTS_RESULT}"
        mvn --batch-mode --update-snapshots clean install -DprojectType=${STEPS_DTRACK_PROJECT_TYPE_RESULT}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        STEPS_MAVEN_OPTS_RESULT: ${{ steps.maven_opts.outputs.result }}
        STEPS_DTRACK_PROJECT_TYPE_RESULT: ${{ steps.dtrack_project_type.outputs.result }}
