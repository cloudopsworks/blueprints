name: Verify Java Component
author: cloudopsworks
description: Verify Java component (depends on build component)
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
    deprecationMessage: 'ACTION is DEPRECATED. not in use after workflow v5.6.x'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
    deprecationMessage: 'ACTION is DEPRECATED. not in use after workflow v5.6.x'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
    deprecationMessage: 'ACTION is DEPRECATED. not in use after workflow v5.6.x'
  token:
    description: 'The github token to use for the build'
    required: true
    deprecationMessage: 'ACTION is DEPRECATED. not in use after workflow v5.6.x'
  dtrack_project_type:
    description: 'The Dependency Track project type'
    required: false
    default: 'library'
    deprecationMessage: 'ACTION is DEPRECATED. not in use after workflow v5.6.x'

runs:
    using: 'composite'
    steps:
      # Get from global inputs the custom Maven Options
      - name: Get Maven options
        id: maven_opts
        shell: bash
        env:
          INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        run: |
          RET=$(yq e -I=0 ".maven_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
          {
            echo "result<<EOF"
            echo "${RET}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      # Build the code!
      - name: Build Code
        working-directory: ${{ inputs.source_path }}
        shell: bash
        run: |
          echo "::group::Maven Build"
          MAVEN_OPTS="$MAVEN_OPTS ${STEPS_MAVEN_OPTS_RESULT}"
          mvn --batch-mode --update-snapshots install -DprojectType=${INPUTS_DTRACK_PROJECT_TYPE}
          echo "::endgroup::"
        env:
          GITHUB_ACTOR: ${{ inputs.bot_user }}
          GITHUB_TOKEN: ${{ inputs.token }}

          STEPS_MAVEN_OPTS_RESULT: ${{ steps.maven_opts.outputs.result }}
          INPUTS_DTRACK_PROJECT_TYPE: ${{ inputs.dtrack_project_type }}
