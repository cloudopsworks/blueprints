name: Generate Containerized Java Application
author: cloudopsworks
description: Generate a containerized Java application
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  semver:
    description: 'The semver version to use for the build'
    required: true
  java_version:
    description: 'The Java version to use for the build'
    required: true
  java_dist:
    description: 'The Java distribution to use for the build'
    required: true
  java_image_variant:
    description: 'The Java image variant to use for the build'
    required: true
  environment:
    description: 'The environment to use for the build'
    required: true
  is_release:
    description: 'The release flag'
    required: true
  default_registry_address:
    description: 'The default registry'
    required: true
  project_key:
    description: 'The project name key'
    required: true
  project_owner:
    description: 'The project owner'
    required: true
  observability_enabled:
    description: 'The observability flag'
    required: false
    default: 'false'
  observability_agent:
    description: 'The observability agent'
    required: false
    default: 'xray'

runs:
  using: 'composite'
  steps:
    # Recover the docker_registry value from the environment file
    - name: Get Docker Registry value if set into the ENV file
      id: docker_registry
      shell: bash
      env:
        INPUTS_DEFAULT_REGISTRY_ADDRESS: ${{ inputs.default_registry_address }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        RET=$(yq -I=0 ".container_registry // strenv(INPUTS_DEFAULT_REGISTRY_ADDRESS)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Docker Inline Setting
      id: docker_inline
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".docker_inline // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Docker Arguments
      id: docker_args_global
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".docker_args // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Docker Arguments for ${{ inputs.environment }}
      id: docker_args_env
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        RET=$(yq e -I=0 ".docker_args // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Custom Run Command
      id: custom_run_command
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".custom_run_command // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Custom Usergroup
      id: custom_usergroup
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".custom_usergroup // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Copy Dockerfile Java App
      shell: bash
      env:
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        cp -pf "${INPUTS_BLUEPRINT_PATH}/ci/container/blueprints/java/"* "${INPUTS_SOURCE_PATH}/"
        cp -pf "${INPUTS_BLUEPRINT_PATH}/ci/container/blueprints/java/.dockerignore" "${INPUTS_SOURCE_PATH}/"

    - name: Get default config_map mount point for environment
      id: config_map_mount_point
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        RET=$(yq e -I=0 ".config_map.mount_point // \"/app/configmap\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get xray config file from inputs-global.yaml
      id: xray_config_file
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'xray' }}
      shell: bash
      env:
        STEPS_CONFIG_MAP_MOUNT_POINT_RESULT: ${{ steps.config_map_mount_point.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 "(.observability.config.configFilePath // strenv(STEPS_CONFIG_MAP_MOUNT_POINT_RESULT)) + \"/\" + (.observability.config.configFileName // \"xray-agent.json\")" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Download AWS Xray agent
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'xray' }}
      shell: bash
      working-directory: ${{ inputs.source_path }}/target
      run: |
        tmpdir=$(mktemp -d)
        mkdir -p observability/
        curl -Lo $tmpdir/xray-agent.zip https://github.com/aws/aws-xray-java-agent/releases/latest/download/xray-agent.zip
        unzip $tmpdir/xray-agent.zip -d observability/
        curl -Lo observability/aws-opentelemetry-agent.jar https://github.com/aws-observability/aws-otel-java-instrumentation/releases/latest/download/aws-opentelemetry-agent.jar

    - name: Dockerfile Java Specific Injection
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        INPUTS_OBSERVABILITY_ENABLED: ${{ inputs.observability_enabled }}
        INPUTS_OBSERVABILITY_AGENT: ${{ inputs.observability_agent }}
        INPUTS_DOCKER_INLINE: ${{ inputs.docker_inline }}
      run: |
        echo "::group::Injecting Java content in Dockerfile..."
        DOCKERFILE=Dockerfile
        TEMP_FILE=$(mktemp)
        INJECTION_POINT="#<JAVA-INJECTION-POINT>"
        while IFS= read -r line; do
          if [[ "$line" =~ $INJECTION_POINT ]]; then
            # Insert the content related to observability agent installation
            if [ "${INPUTS_OBSERVABILITY_ENABLED}" == "true" ]; then
              case "${INPUTS_OBSERVABILITY_AGENT}" in
                xray)
                  echo "COPY target/observability/aws-opentelemetry-agent.jar /app/aws-opentelemetry-agent.jar"
                  ;;
                datadog)
                  echo "ADD 'https://dtdg.co/latest-java-tracer' /app/webapp/dd-java-agent.jar"
                  ;;
              esac
            fi 
            # Insert the content of input at the injection point depending on conditions
            JARDEP=$(find target -name "*with-dependencies.jar" | head -1)
            if [ -n "$JARDEP" ]; then
              echo "COPY $JARDEP /app/webapp/app.jar"
            else
              [ -d target/libs/ ] && echo "COPY target/libs/* /app/webapp/libs/"
              echo "COPY target/*.jar /app/webapp/app.jar"
            fi
            echo "${INPUTS_DOCKER_INLINE}"
          else
            # Print the current line
            echo "$line"
          fi
        done < "$DOCKERFILE" > "$TEMP_FILE"
        mv "$TEMP_FILE" "$DOCKERFILE"
        cat "$DOCKERFILE"
        echo "::endgroup::"

    - name: APM Arguments setup
      id: apm_args
      shell: bash
      if: ${{ inputs.observability_enabled == 'true' }}
      env:
        INPUTS_OBSERVABILITY_AGENT: ${{ inputs.observability_agent }}
        STEPS_XRAY_CONFIG_FILE_RESULT: ${{ steps.xray_config_file.outputs.result }}
      run: |
        case "${INPUTS_OBSERVABILITY_AGENT}" in
          xray)
            #echo "result=APM_OPTS=-javaagent:/app/webapp/disco/disco-java-agent.jar=pluginPath=/app/webapp/disco/disco-plugins -Dcom.amazonaws.xray.configFile=${STEPS_XRAY_CONFIG_FILE_RESULT}" >> $GITHUB_OUTPUT
            echo "result=APM_OPTS=-javaagent:/app/aws-opentelemetry-agent.jar" >> $GITHUB_OUTPUT
            ;;
          datadog)
            echo "result=APM_OPTS=-javaagent:/app/webapp/dd-java-agent.jar" >> $GITHUB_OUTPUT
            ;;
        esac

    # Java version image settings (adopt is deprecated)
    - name: Set output with Java Version
      id: docker_image_name
      shell: bash
      env:
        INPUTS_JAVA_VERSION: ${{ inputs.java_version }}
        INPUTS_JAVA_DIST: ${{ inputs.java_dist }}
        INPUTS_JAVA_IMAGE_VARIANT: ${{ inputs.java_image_variant }}
      run: |
        if [ "${INPUTS_JAVA_VERSION}" != "" ] ; then
          case "${INPUTS_JAVA_DIST}" in
            adopt)
              echo "result=IMAGE_NAME=adoptopenjdk:${INPUTS_JAVA_VERSION}-${INPUTS_JAVA_IMAGE_VARIANT}" >> $GITHUB_OUTPUT
              ;;
            zulu)
              case "${INPUTS_JAVA_IMAGE_VARIANT}" in
                debian)
                  echo "result=IMAGE_NAME=azul/zulu-openjdk-debian:${INPUTS_JAVA_VERSION}" >> $GITHUB_OUTPUT
                  ;;
                centos)
                  echo "result=IMAGE_NAME=azul/zulu-openjdk-centos:${INPUTS_JAVA_VERSION}" >> $GITHUB_OUTPUT
                  ;;
                standard|std|slim)
                  echo "result=IMAGE_NAME=azul/zulu-openjdk:${INPUTS_JAVA_VERSION}" >> $GITHUB_OUTPUT
                  ;;
                *)
                  echo "result=IMAGE_NAME=azul/zulu-openjdk-alpine:${INPUTS_JAVA_VERSION}" >> $GITHUB_OUTPUT
                  ;;
              esac
              ;;
            corretto)
              echo "result=IMAGE_NAME=amazoncorretto:${INPUTS_JAVA_VERSION}-${INPUTS_JAVA_IMAGE_VARIANT}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "result=IMAGE_NAME=eclipse-temurin:${INPUTS_JAVA_VERSION}-${INPUTS_JAVA_IMAGE_VARIANT}" >> $GITHUB_OUTPUT
              ;;
          esac
        fi

    # if custom_run_command is non empty then need to override the startup.sh scripts with new content, write the file in-place
    - name: Set custom run command
      working-directory: ${{ inputs.source_path }}
      if: ${{ steps.custom_run_command.outputs.result != '' }}
      shell: bash
      run: |
        echo "Creation of custom startup.sh script..."
        cat > ./startup.sh << EOF
        #!/bin/sh
        
        # Startup the Java App (custom command)
        cd /app/webapp
        $CUSTOM_RUN_COMMAND
        EOF
        cat ./startup.sh
      env:
        CUSTOM_RUN_COMMAND: ${{ steps.custom_run_command.outputs.result }}

    # Run Generalized Docker Build & Upload Artifact
    - name: Generalized Docker Build
      uses: ./bp/ci/container/build
      with:
        semver: ${{ inputs.semver }}
        docker_registry: ${{ steps.docker_registry.outputs.result }}
        docker_inline: ${{ steps.docker_inline.outputs.result }}
        docker_image_name: ${{ steps.docker_image_name.outputs.result }}
        docker_args: ${{ steps.docker_args_env.outputs.result == '' && steps.docker_args_global.outputs.result || steps.docker_args_env.outputs.result }}
        apm_args: ${{ inputs.observability_enabled == 'true' && steps.apm_args.outputs.result || '' }}
        environment: ${{ inputs.environment }}
        project_key: ${{ inputs.project_key }}
        project_owner: ${{ inputs.project_owner }}
        custom_usergroup: ${{ steps.custom_usergroup.outputs.result }}
        is_release: ${{ inputs.is_release }}
