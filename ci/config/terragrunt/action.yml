name: Get Configuration Values for Terragrunt Modules
author: cloudopsworks
description: Get configuration values for the workflow from the source vars, specific for Terragrunt Modules
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  execution_path:
    description: 'The path to the execution directory, defaults to source_path if not provided'
    required: false
    default: ''

outputs:
  jira_integration:
    description: 'The Jira integration flag, true or false'
    value: ${{ steps.jira_integration.outputs.result }}
  jira_project_key:
    description: 'The Jira project key value'
    value: ${{ steps.jira_project_key.outputs.result }}
  jira_project_id:
    description: 'The Jira project ID value'
    value: ${{ steps.jira_project_id.outputs.result }}
  runner_set:
    description: 'The runner set to use for the workflow'
    value: ${{ steps.runner_set.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Install runner-tools
      uses: cloudopsworks/blueprints/ci/common/install/runner-tools@v5.10
      with:
        source_path: ${{ inputs.source_path }}

    # Get the JIRA configuration
    # Get JIRA is enabled or not defaults to true
    - name: Is JIRA Enabled?
      id: jira_integration
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.enabled // \"true\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs-jira.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get the JIRA Project KEY
    - name: Get JIRA Project KEY
      id: jira_project_key
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.project_key // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs-jira.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get the JIRA Project ID
    - name: Get JIRA Project ID
      id: jira_project_id
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.project_id // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs-jira.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get runnerset with yq from global-inputs.yaml
      id: runner_set
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq ".runner_set // \"ubuntu-latest\"" "./${INPUTS_SOURCE_PATH}/global-inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
