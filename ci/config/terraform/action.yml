name: Get Configuration Values for Terraform Modules
author: cloudopsworks
description: Get configuration values for the workflow from the source vars, specific for Terraform Modules
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'

outputs:
  checkov_enabled:
    description: 'The Checkov enabled flag, true or false'
    value: ${{ steps.checkov.outputs.result }}
  secret_scan_enabled:
    description: 'The Secret Scan enabled flag, true or false'
    value: ${{ steps.secret_scan.outputs.result }}
  semgrep_enabled:
    description: 'The Semgrep enabled flag, true or false'
    value: ${{ steps.semgrep.outputs.result }}
  jira_integration:
    description: 'The Jira integration flag, true or false'
    value: ${{ steps.jira_integration.outputs.result }}
  jira_project_key:
    description: 'The Jira project key value'
    value: ${{ steps.jira_project_key.outputs.result }}
  jira_project_id:
    description: 'The Jira project ID value'
    value: ${{ steps.jira_project_id.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Install runner-tools
      uses: cloudopsworks/blueprints/ci/common/install/runner-tools@v5.10
      with:
        source_path: ${{ inputs.source_path }}

    # Get the JIRA configuration
    # Get JIRA is enabled or not defaults to true
    - name: Is JIRA Enabled?
      id: jira_integration
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.enabled // \"true\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get the JIRA Project KEY
    - name: Get JIRA Project KEY
      id: jira_project_key
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.project_key // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get the JIRA Project ID
    - name: Get JIRA Project ID
      id: jira_project_id
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".jira.project_id // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get Checkov Enablement defaults to true
    - name: Get Checkov Config
      id: checkov
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".checkov.enabled // \"true\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get Secret Scan Enablement defaults to true
    - name: Get Secret Scan Config
      id: secret_scan
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".secret_scan.enabled // \"true\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get Semgrep Scan Enablement, defaults to true
    - name: Get Semgrep Scan Config
      id: semgrep
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".semgrep.enabled // \"true\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/inputs.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
