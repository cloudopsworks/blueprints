name: Dependency Track Scan
author: cloudopsworks
description: This action scans the Python code using Dependency Track
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  dtrack_url:
    description: 'The Dependency Track URL'
    required: true
  dtrack_token:
    description: 'The Dependency Track token'
    required: true
  dtrack_project_key:
    description: 'The Dependency Track project key'
    required: true
  semver:
    description: 'The Semver version'
    required: true
  token:
    description: 'The Github token'
    required: true

runs:
  # TODO: DUPLICATE CODE with java/dtrack/action.yml
  using: 'composite'
  steps:
    # SBOM upload
    - name: SBOM Dtrack Upload
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        INPUTS_DTRACK_URL: ${{ inputs.dtrack_url }}
        INPUTS_DTRACK_TOKEN: ${{ inputs.dtrack_token }}
        INPUTS_DTRACK_PROJECT_KEY: ${{ inputs.dtrack_project_key }}
        INPUTS_SEMVER: ${{ inputs.semver }}
      run: |
        curl -X "POST" "https://${INPUTS_DTRACK_URL}/api/v1/bom" \
             -H 'Content-Type: multipart/form-data' \
             -H 'X-API-Key: '"${INPUTS_DTRACK_TOKEN}" \
             -F "autoCreate=true" \
             -F "projectName=${INPUTS_DTRACK_PROJECT_KEY}" \
             -F "projectVersion=${INPUTS_SEMVER}" \
             -F "bom=@bom.xml"
