name: Build Python Sources with Poetry
author: cloudopsworks
description: Build Python sources with poetry
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  python_extra_env:
    description: 'The extra environment variables'
    required: true
  python_requirements_file:
    description: 'The requirements file'
    required: false
    default: './requirements.txt'

runs:
  using: 'composite'
  steps:
    # Install poetry
    - name: Install poetry
      shell: bash
      run: pipx install poetry

    - name: Install Dependencies (Poetry)
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::Poetry Install"
        source .venv/bin/activate
        echo "Installing dependencies"
        ${INPUTS_PYTHON_EXTRA_ENV} poetry install
        echo "Exporting requirements"
        poetry export --with dev --without-hashes --format=requirements.txt > ${INPUTS_SOURCE_PATH}/${INPUTS_PYTHON_REQUIREMENTS_FILE}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${INPUTS_BOT_USER}
        GITHUB_TOKEN: ${INPUTS_TOKEN}
        INPUTS_PYTHON_EXTRA_ENV: ${INPUTS_PYTHON_EXTRA_ENV}
        INPUTS_SOURCE_PATH: ${INPUTS_SOURCE_PATH}
        INPUTS_PYTHON_REQUIREMENTS_FILE: ${INPUTS_PYTHON_REQUIREMENTS_FILE}
        INPUTS_BOT_USER: ${INPUTS_BOT_USER}
        INPUTS_TOKEN: ${INPUTS_TOKEN}
