name: Semgrep code Scanning Dockerfile
author: cloudopsworks
description: This action scans the Dockerfile using Semgrep and outputs the results in various formats.
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  semgrep_token:
    description: 'The Semgrep token'
    required: true
  bot_user:
    description: 'The bot user'
    required: true
  token:
    description: 'The Github token'
    required: true
  semgrep_excludes:
    description: 'The Semgrep excludes'
    required: false
    default: '.github/workflows/*,src/test/*'

runs:
  using: 'composite'
  steps:
    - name: Check GHAS Enabled
      id: check_ghas
      uses: ./ci/common/advancedsecurity/check
      with:
        token: ${{ inputs.token }}

    # Split the semgrep_excludes into tokens and return as the result for each token prepended with --exclude xxx
    # eg: --exclude aaa --exclude bbb options
    - name: Download tarball image
      uses: actions/download-artifact@v7
      with:
        pattern: docker-image*
        path: ${{ inputs.source_path }}

    - name: Split semgrep_excludes
      id: split_excludes
      shell: bash
      run: |
        if [[ -n "${{ inputs.semgrep_excludes }}" ]]; then
          result="--exclude '$(echo "${{ inputs.semgrep_excludes }}" | sed "s/,/' --exclude '/g")'"
        else
          result=""
        fi
        echo "result=$result" >> $GITHUB_OUTPUT

    - name: Semgrep Code Scanning
      id: semgrep
      env:
        SEMGREP_APP_TOKEN: ${{ inputs.semgrep_token }}
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        semgrep ci --text --output=semgrep.txt --json-output=semgrep-ci.json --sarif-output=semgrep.sarif ${{ steps.split_excludes.outputs.result }}
#        semgrep --config=p/dockerfile . --json ${{ steps.split_excludes.outputs.result }} > semgrep.json

    - name: Upload SARIF file
      if: |
        (success() || failure()) &&
        (steps.check_ghas.outputs.ghas_enabled == 'true')
      uses: github/codeql-action/upload-sarif@v4
      with:
        checkout_path: ${{ inputs.source_path }}
        sarif_file: ${{ inputs.source_path }}/semgrep.sarif
        wait-for-processing: false
