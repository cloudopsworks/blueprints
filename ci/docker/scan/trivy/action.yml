name: Semgrep code Scanning Dockerfile
author: cloudopsworks
description: This action scans the Dockerfile using Semgrep and outputs the results in various formats.
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  bot_user:
    description: 'The bot user'
    required: true
  token:
    description: 'The Github token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Download tarball image
      uses: actions/download-artifact@v7
      with:
        name: docker-image
        path: ${{ inputs.source_path }}

    - name: Manual Trivy Setup
      uses: aquasecurity/setup-trivy@v0.2.0
      with:
        cache: true
        version: v0.69.3

    - name: Run Trivy vulnerability scanner - sarif output
      uses: aquasecurity/trivy-action@0.35.0
      with:
        input: '${{ inputs.source_path }}/docker-image.tar'
        scan-type: 'image'
        format: 'json'
        output: '${{ inputs.source_path }}/trivy-results.json'
        skip-setup-trivy: true
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH,MEDIUM'
        github-pat: ${{ inputs.token }}
        scanners: 'vuln'

    - name: Run Trivy vulnerability scanner - sarif output
      uses: aquasecurity/trivy-action@0.35.0
      with:
        input: '${{ inputs.source_path }}/docker-image.tar'
        scan-type: 'image'
        format: 'sarif'
        output: '${{ inputs.source_path }}/trivi-results.sarif'
        skip-setup-trivy: true
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
        github-pat: ${{ inputs.token }}
        scanners: 'vuln'
        limit-severities-for-sarif: true

    # Determine the default master/main branch whenever we are on a tag (usually the current checkout have no HEAD)
    - name: Master branch
      id: default_branch
      shell: bash
      run: |
        local default_branch=""

        # Method 1: Check symbolic ref for remote HEAD
        default_branch=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@')
        
        # Method 2: If symbolic ref doesn't exist, query remote
        if [ -z "$default_branch" ]; then
          default_branch=$(git remote show origin 2>/dev/null | grep "HEAD branch" | sed 's/.*: //')
        fi
        
        # Method 3: If still not found, check which branch exists (main or master)
        if [ -z "$default_branch" ]; then
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            default_branch="main"
          elif git rev-parse --verify origin/master >/dev/null 2>&1; then
            default_branch="master"
          fi
        fi
        
        # Method 4: Fallback - check local branches
        if [ -z "$default_branch" ]; then
          if git rev-parse --verify main >/dev/null 2>&1; then
            default_branch="main"
          elif git rev-parse --verify master >/dev/null 2>&1; then
            default_branch="master"
          fi
        fi
        
        echo "result=$default_branch" >> $GITHUB_OUTPUT

    - name: Upload SARIF file
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v4
      with:
        ref: ${{ startsWith(github.ref, 'refs/tags/v') && format('refs/branches/{0}', steps.default_branch.outputs.result) || github.ref }}
        checkout_path: ${{ inputs.source_path }}
        sarif_file: ${{ inputs.source_path }}/trivi-results.sarif
        wait-for-processing: false
