name: Build .Net Sources
author: cloudopsworks
description: Build .NEt sources and save artifacts
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  sources_artifacts_name:
    description: 'The name of the sources to save'
    required: false
    default: 'source_artifacts'
  bot_user:
    description: 'The bot user to use for the build'
    required: true
  token:
    description: 'The github token to use for the build'
    required: true
  environment:
    description: 'The environment to use for the build'
    required: true
outputs:
  dotnet_version:
    description: 'The .Net version to use for the build'
    value: ${{ steps.dotnet_version.outputs.result }}
  dotnet_dist:
    description: 'The .Net distribution to use for the build'
    value: ${{ steps.dotnet_dist.outputs.result }}
  dotnet_image_variant:
    description: 'The .Net image variant to use for the build, currently not fully supported'
    value: ${{ steps.dotnet_image_variant.outputs.result }}
  semver:
    description: 'The semver version'
    value: ${{ steps.semver.outputs.result }}
  package_name:
    description: 'The package name'
    value: ${{ steps.package_name.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Check tools and install
      shell: bash
      run: |
        echo "::group::Check Tools"
        sudo apt-get update
        which make || sudo apt-get install -y make
        which gh || sudo apt-get install -y gh
        echo "::endgroup::"

    # Get pipeline conf .Net version Defaults to 9
    - name: Get pipeline .Net version
      id: dotnet_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dotnet.version // \"10.0\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf .Net dist defaults to aspnet
    - name: Get pipeline .Net dist
      id: dotnet_dist
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dotnet.dist // \"aspnet\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf .Net image variant defaults to alpine
    - name: Get pipeline .Net image variant
      id: dotnet_image_variant
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dotnet.image_variant // \"alpine\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get pipeline conf .Net build project path
    - name: Get pipeline .Net build project path
      id: project_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dotnet.project_path // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

      # Validate project_path must not be blank, othewise fail the entire workflow

    - name: Validate project_path
      id: validate_project_path
      shell: bash
      env:
        STEPS_PROJECT_PATH_RESULT: ${{ steps.project_path.outputs.result }}
      run: |
        if [ -z "${STEPS_PROJECT_PATH_RESULT}" ]; then
          echo "Error: project_path is empty"
          exit 1
        fi

    # Get the Package name from project's path csproj file
    - name: Get Package name
      id: package_name
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        STEPS_PROJECT_PATH_RESULT: ${{ steps.project_path.outputs.result }}
      run: |
        RET=$(yq e -px -oy ".Project.PropertyGroup.AssemblyName" "${INPUTS_SOURCE_PATH}/${STEPS_PROJECT_PATH_RESULT}/${STEPS_PROJECT_PATH_RESULT}.csproj")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Build Options
    - name: Get .Net Build options
      id: build_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".build_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Build Options
    - name: Get .Net Build options
      id: run_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".run_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Build Options
    - name: Get .Net Publish options
      id: publish_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".publish_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the custom Test Options
    - name: Get .Net Test options
      id: test_opts
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".test_options // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the default configuration
    - name: Get .Net default configuration
      id: global_default_configuration
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".dotnet.configuration // \"Release\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get from global inputs the default configuration
    - name: Get .Net default configuration
      id: default_configuration
      shell: bash
      env:
        STEPS_GLOBAL_DEFAULT_CONFIGURATION_RESULT: ${{ steps.global_default_configuration.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        RET=$(yq e -I=0 ".dotnet_configuration // strenv(STEPS_GLOBAL_DEFAULT_CONFIGURATION_RESULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Get DependencyTrack project type configuration, default is null
    - name: Get Pipeline conf DependencyTrack Project type
      id: dtrack_project_type
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".dependencyTrack.type // \"application\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    # Check existence of packages.lock.json and set to true
    - name: Check for packages.lock.json
      id: lock_file
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        STEPS_PROJECT_PATH_RESULT: ${{ steps.project_path.outputs.result }}
      run: |
        if [ -f "${INPUTS_SOURCE_PATH}/${STEPS_PROJECT_PATH_RESULT}/packages.lock.json" ]; then
          echo "result=true" >> $GITHUB_OUTPUT
        else
          echo "result=false" >> $GITHUB_OUTPUT
        fi

    # Setup .Net SDK for builds
    - name: Set .Net SDK
      uses: actions/setup-dotnet@v4
      env:
        NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      with:
        dotnet-version: "${{ steps.dotnet_version.outputs.result }}"
        cache: ${{ steps.lock_file.outputs.result }}

    # Versioning SET
    - name: Version SET
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::.Net Version SET"
        make version
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Version Capture
      working-directory: ${{ inputs.source_path }}
      id: semver
      shell: bash
      run: |
        echo "result=$(cat VERSION)" >> $GITHUB_OUTPUT

    # Build the code!
    - name: Build Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::.Net Build"
        dotnet restore ${EXPR_STEPS_LOCK_FILE_OUTPUTS_RESULT_TRUE_LOCKED_MODE}
        dotnet build --configuration ${STEPS_DEFAULT_CONFIGURATION_RESULT} ${STEPS_BUILD_OPTS_RESULT} --no-restore --verbosity normal
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

        EXPR_STEPS_LOCK_FILE_OUTPUTS_RESULT_TRUE_LOCKED_MODE: ${{ steps.lock_file.outputs.result == 'true' && '--locked-mode' || ' ' }}
        STEPS_DEFAULT_CONFIGURATION_RESULT: ${{ steps.default_configuration.outputs.result }}
        STEPS_BUILD_OPTS_RESULT: ${{ steps.build_opts.outputs.result }}
        GITHUB_WORKSPACE: ${{ github.workspace }}

    # Test the code!
    - name: Test Code
      working-directory: ${{ inputs.source_path }}
      shell: bash
      run: |
        echo "::group::.Net Tests"
        dotnet test --configuration ${STEPS_DEFAULT_CONFIGURATION_RESULT} ${STEPS_TEST_OPTS_RESULT} \
          --no-build --no-restore --verbosity normal --collect "XPlat Code Coverage" \
          --results-directory ./TestResults /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura -- ${STEPS_RUN_OPTS_RESULT}
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}

        STEPS_DEFAULT_CONFIGURATION_RESULT: ${{ steps.default_configuration.outputs.result }}
        STEPS_TEST_OPTS_RESULT: ${{ steps.test_opts.outputs.result }}
        STEPS_RUN_OPTS_RESULT: ${{ steps.run_opts.outputs.result }}

#    # SBOM generation
#    - name: SBOM Generation for Dtrack
#      uses: CycloneDX/gh-dotnet-generate-sbom@v1
#      with:
#        path: ${{ inputs.source_path }}/${{ steps.project_path.outputs.result }}.sln
#        json: false
#        github-bearer-token: ${{ inputs.token }}
    - name: Install CycloneDX DotNet Tool
      id: install_cyclonedx
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Install CycloneDX DotNet Tool"
        dotnet tool install --global CycloneDX
        echo "::endgroup::"

    - name: Generate SBOM
      shell: bash
      working-directory: ${{ inputs.source_path }}
      run: |
        echo "::group::Generate SBOM"
        dotnet CycloneDX $STEPS_PROJECT_PATH_RESULT.sln -o bom.xml -F Xml
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        STEPS_PROJECT_PATH_RESULT: ${{ steps.project_path.outputs.result }}

    - name: Run .Net Publishing
      shell: bash
      working-directory: ${{ inputs.source_path }}
      run: |
        echo "::group::.Net Publishing"
        dotnet publish --configuration ${STEPS_DEFAULT_CONFIGURATION_RESULT} ${STEPS_PROJECT_PATH_RESULT} \
          ${STEPS_PUBLISH_OPTS_RESULT} --output ./PublishRelease --no-build --no-restore
        echo "::endgroup::"
      env:
        GITHUB_ACTOR: ${{ inputs.bot_user }}
        GITHUB_TOKEN: ${{ inputs.token }}
        NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
        STEPS_DEFAULT_CONFIGURATION_RESULT: ${{ steps.default_configuration.outputs.result }}
        STEPS_PROJECT_PATH_RESULT: ${{ steps.project_path.outputs.result }}
        STEPS_PUBLISH_OPTS_RESULT: ${{ steps.publish_opts.outputs.result }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
