name: Sonarqube Scan .Net
author: cloudopsworks
description: This action scans the .Net code using Sonarqube
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  sonarqube_url:
    description: 'The Sonarqube URL'
    required: true
  sonarqube_token:
    description: 'The Sonarqube token'
    required: true
  sonarqube_project_key:
    description: 'The Sonarqube project key'
    required: true
  semver:
    description: 'The Semver version'
    required: true
  token:
    description: 'The Github token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get Repository Owner from inputs-global.yaml
      id: repo_owner
      shell: bash
      env:
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".repository_owner // strenv(GITHUB_REPOSITORY_OWNER)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonnar Scanner version, if needed to be adjusted, allways defaults to latest
      id: sonar_scanner_version
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.scanner_version // \"latest\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar sources form inputs-global.yaml
      id: source_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.sources_path // \"src/\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar binaries from inputs-global.yaml
      id: binaries_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.binaries_path // \"target/classes\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar libraries from inputs-global.yaml
      id: libraries_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.libraries_path // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar tests from inputs-global.yaml (defaults to source_path)
      id: tests_path
      shell: bash
      env:
        STEPS_SOURCE_PATH_RESULT: ${{ steps.source_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_path // strenv(STEPS_SOURCE_PATH_RESULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar test binaries from inputs-global.yaml
      id: test_binaries_path
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_binaries // \"target/test-classes\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar test inclusions from inputs-global.yaml
      id: test_inclusions_path
      shell: bash
      env:
        STEPS_TESTS_PATH_RESULT: ${{ steps.tests_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        SONAR_TEST_INCLUSIONS_DEFAULT="${STEPS_TESTS_PATH_RESULT}/**/test/**/*"
        RET=$(SONAR_TEST_INCLUSIONS_DEFAULT="${SONAR_TEST_INCLUSIONS_DEFAULT}" yq e -I=0 ".sonarqube.tests_inclusions // strenv(SONAR_TEST_INCLUSIONS_DEFAULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar test libraries from inputs-global.yaml
      id: test_libraries_path
      shell: bash
      env:
        STEPS_LIBRARIES_PATH_RESULT: ${{ steps.libraries_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.tests_libraries // strenv(STEPS_LIBRARIES_PATH_RESULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Get Sonar extra exclusions from inputs-global.yaml
      id: extra_exclusions_paths
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.extra_exclusions // \"\"" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Sonar exclusions from inputs-global.yaml
      id: exclusions_paths
      shell: bash
      env:
        STEPS_TESTS_PATH_RESULT: ${{ steps.tests_path.outputs.result }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        SONAR_EXCLUSIONS_DEFAULT="target/**/*,apifiles/**/*,${STEPS_TESTS_PATH_RESULT}/**/*"
        RET=$(SONAR_EXCLUSIONS_DEFAULT="${SONAR_EXCLUSIONS_DEFAULT}" yq e -I=0 ".sonarqube.exclusions // strenv(SONAR_EXCLUSIONS_DEFAULT)" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get if sonar branch setting is disabled
      id: branch_disabled
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -I=0 ".sonarqube.branch_disabled and true" "./${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Install .Net Sonar Scanner
      shell: bash
      run: |
        dotnet tool install --global dotnet-sonarscanner
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Run Sonar Scanner .Net
      shell: bash
      env:
        INPUTS_SONARQUBE_PROJECT_KEY: ${{ inputs.sonarqube_project_key }}
        INPUTS_SEMVER: ${{ inputs.semver }}
        INPUTS_SONARQUBE_TOKEN: ${{ inputs.sonarqube_token }}
        INPUTS_SONARQUBE_URL: ${{ inputs.sonarqube_url }}
        STEPS_SONAR_BRANCH_ARG: ${{ steps.branch_disabled.outputs.result != 'true' && format('/d:sonar.branch.name="{0}"',github.ref_name) || ' ' }}
        INPUTS_SONAR_ORGANIZATION_ARG: ${{ contains(inputs.sonarqube_url, 'sonarcloud.io') && format('/d:sonar.organization="{0}"',steps.repo_owner.outputs.result) || ' ' }}
      run: |
        dotnet-sonarscanner begin "/k:${INPUTS_SONARQUBE_PROJECT_KEY}" "/v:${INPUTS_SEMVER}" "/d:sonar.token=${INPUTS_SONARQUBE_TOKEN}" /d:sonar.lang.patterns.openapi=openapi "/d:sonar.host.url=${INPUTS_SONARQUBE_URL}" ${STEPS_SONAR_BRANCH_ARG} ${INPUTS_SONAR_ORGANIZATION_ARG}
        dotnet build <path to project file or .sln file> --no-incremental
        dotnet-sonarscanner end "/d:sonar.token=${INPUTS_SONARQUBE_TOKEN}"
