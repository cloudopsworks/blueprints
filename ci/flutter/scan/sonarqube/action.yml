name: SonarQube Scan Flutter
author: cloudopsworks
description: Scan Flutter/Dart projects with SonarQube
inputs:
  source_path:
    required: false
    default: 'source'
    description: 'The path to the source code'
  sonarqube_url:
    required: true
    description: 'SonarQube URL'
  sonarqube_token:
    required: true
    description: 'SonarQube token'
  sonarqube_project_key:
    required: true
    description: 'SonarQube project key'
  semver:
    required: true
    description: 'Semantic version'
  token:
    required: false
    default: ${{ github.token }}
    description: 'GitHub token'
runs:
  using: 'composite'
  steps:
    - name: Get Repository Owner
      id: repo_owner
      shell: bash
      working-directory: ${{ inputs.source_path }}
      env:
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        result=$(yq e ".repository_owner // strenv(GITHUB_REPOSITORY_OWNER)" .cloudopsworks/vars/inputs-global.yaml)
        printf 'result=%s\n' "${result}" >> "${GITHUB_OUTPUT}"

    - name: Resolve SonarQube Flutter settings
      id: settings
      shell: bash
      working-directory: ${{ inputs.source_path }}
      run: |
        sources=$(yq e ".sonarqube.sources_path // \"lib\"" .cloudopsworks/vars/inputs-global.yaml)
        printf 'sources=%s\n' "${sources}" >> "${GITHUB_OUTPUT}"
        tests=$(yq e ".sonarqube.tests_path // \"test\"" .cloudopsworks/vars/inputs-global.yaml)
        printf 'tests=%s\n' "${tests}" >> "${GITHUB_OUTPUT}"
        test_inclusions=$(yq e ".sonarqube.tests_inclusions // \"test/**/*\"" .cloudopsworks/vars/inputs-global.yaml)
        printf 'test_inclusions=%s\n' "${test_inclusions}" >> "${GITHUB_OUTPUT}"
        exclusions=$(yq e ".sonarqube.exclusions // \"build/**,.dart_tool/**,ios/Pods/**,android/.gradle/**\"" .cloudopsworks/vars/inputs-global.yaml)
        printf 'exclusions=%s\n' "${exclusions}" >> "${GITHUB_OUTPUT}"
        branch_disabled=$(yq e ".sonarqube.branch_disabled and true" .cloudopsworks/vars/inputs-global.yaml)
        printf 'branch_disabled=%s\n' "${branch_disabled}" >> "${GITHUB_OUTPUT}"
        if [[ -f coverage/lcov.info ]]; then echo "lcov=coverage/lcov.info" >> "$GITHUB_OUTPUT"; else echo "lcov=" >> "$GITHUB_OUTPUT"; fi

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v8
      env:
        SONAR_TOKEN: ${{ inputs.sonarqube_token }}
        SONAR_HOST_URL: ${{ inputs.sonarqube_url }}
      with:
        projectBaseDir: ${{ inputs.source_path }}
        args: >
          -Dsonar.projectKey=${{ contains(inputs.sonarqube_url, 'sonarcloud.io') && format('{0}_{1}',steps.repo_owner.outputs.result,inputs.sonarqube_project_key) || inputs.sonarqube_project_key }}
          -Dsonar.projectVersion=${{ inputs.semver }}
          -Dsonar.sources=${{ steps.settings.outputs.sources }}
          -Dsonar.tests=${{ steps.settings.outputs.tests }}
          -Dsonar.test.inclusions=${{ steps.settings.outputs.test_inclusions }}
          -Dsonar.exclusions=${{ steps.settings.outputs.exclusions }}
          -Dsonar.dart.lcov.reportPaths=${{ steps.settings.outputs.lcov }}
          ${{ contains(inputs.sonarqube_url, 'sonarcloud.io') && format('-Dsonar.organization={0}',steps.repo_owner.outputs.result) || ' ' }}
          ${{ steps.settings.outputs.branch_disabled != 'true' && format('-Dsonar.branch.name={0}',github.ref_name) || ' ' }}
