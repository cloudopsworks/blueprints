release:
  - base-branch: [ 'main', 'master' ]

feature:
  - head-branch: [ '^feature' ]

hotfix:
  - head-branch: [ '^hotfix', '^fix' ]

README:
  - any: [ 'README.yaml', 'README.md' ]
  
size-S:
  - any: [ '.cloudopsworks/**/*', '.github/workflows/*' ]

size-M:
  - any: [ '**/action.yml', '!.cloudopsworks/**/*', '!.github/workflows/*' ]

