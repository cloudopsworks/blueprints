name: Deploy Mobile Application Google Cloud Platform Firebase Test Lab
author: cloudopsworks
description: Deploy Mobile Application to Google Cloud Platform Firebase Test Lab
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  token:
    description: 'The GitHub token'
    required: true
  platform_type:
    description: 'The mobile platform type'
    required: true
  gcp_credentials:
    description: 'Google Cloud Credentials'
    required: true
  gcp_project:
    description: 'Google Cloud Project Name'
    required: true
  gcp_region:
    description: 'Google Cloud Region'
    required: true
  gcp_impersonate_sa:
    description: 'Google Cloud SA Impersonation account'
    required: true
  terraform_state_conf:
    description: 'The Terraform state configuration'
    required: true
  unlock:
    description: 'Unlock the state'
    required: false
    default: 'false'
  lock_id:
    description: 'The lock ID'
    required: false
    default: ''
  destroy:
    description: 'Destroy the state'
    required: false
    default: 'false'
  release_name:
    description: 'The release name'
    required: true
  release_version:
    description: 'The release version'
    required: true
  qualifier:
    description: 'The release qualifier'
    required: false
    default: ''
  project_key:
    description: 'The package name'
    required: true
  deployment_name:
    description: 'The deployment name'
    required: true
  environment:
    description: 'The environment'
    required: true
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  xcode_version:
    description: 'The Xcode version to use for the build'
    required: false
    default: ''
  xcode_scheme:
    description: 'Xcode Scheme to build and test'
    required: false
    default: ''
  xcode_sdk:
    description: 'Xcode SDK to build and test'
    required: false
    default: ''
  xcode_destination:
    description: 'Xcode Destination to build and test'
    required: false
    default: ''
  android_sdk:
    description: 'The Android SDK SDK to use for the build'
    required: false
    default: ''
  android_destination:
    description: 'The Android SDK destination to use for the build'
    required: false
    default: ''
  android_configuration:
    description: 'The Android SDK configuration to use for the build'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Test Script Path
      id: test_script_path
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        INPUTS_MOBILE_PLATFORM: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ios' || 'android' }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        platform="${INPUTS_MOBILE_PLATFORM}"
        res=$(yq e ".gcp.platforms.${platform}.test_script_path // .gcp.test_script_path // \"device_tests\"" ".cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        echo "result=$res" >> $GITHUB_OUTPUT

    - name: Tests Scripts Available
      id: test_script_available
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        STEPS_TEST_SCRIPT_PATH_RESULT: ${{ steps.test_script_path.outputs.result }}
      run: |
        res=false
        # Check dir exists
        if [ -d "${STEPS_TEST_SCRIPT_PATH_RESULT}" ] ; then
          # Check dir has content
          if [ "$(ls -A "${STEPS_TEST_SCRIPT_PATH_RESULT}")" ] ; then
            res=true
          fi
        fi
        echo "result=$res" >> $GITHUB_OUTPUT

    - name: Test Script Type
      id: run_test_type
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        INPUTS_MOBILE_PLATFORM: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ios' || 'android' }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        platform="${INPUTS_MOBILE_PLATFORM}"
        res=$(yq e ".gcp.platforms.${platform}.test_script_type // .gcp.test_script_type // \"robo\"" ".cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        echo "result=$res" >> $GITHUB_OUTPUT

    - name: Results Bucket Location
      id: results_bucket_option
      working-directory: ${{ inputs.source_path }}
      shell: bash
      env:
        INPUTS_MOBILE_PLATFORM: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ios' || 'android' }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        platform="${INPUTS_MOBILE_PLATFORM}"
        res=$(yq e ".gcp.platforms.${platform}.test_lab_bucket // .gcp.test_lab_bucket // \"\"" ".cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml")
        if [[ "$res" != "" ]] ; then
          res="--results-bucket=$res"
        fi
        echo "result=$res" >> $GITHUB_OUTPUT

    - name: Generate release.yaml
      working-directory: ${{ inputs.blueprint_path }}/devicefarms/gcp
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        INPUTS_PROJECT_KEY: ${{ inputs.project_key }}
        INPUTS_RELEASE_VERSION: ${{ inputs.release_version }}
        INPUTS_FRONTEND_ENV_SUFFIX: ${{ inputs.front_end == 'true' && format('-{0}', inputs.environment) || '' }}
      run: |
        printf "%s\n" \
          "release:" \
          "  name: ${INPUTS_RELEASE_NAME}" \
          "  source:" \
          "    name: ${INPUTS_PROJECT_KEY}" \
          "    version: ${INPUTS_RELEASE_VERSION}${INPUTS_FRONTEND_ENV_SUFFIX}" \
          > release.yaml

    - name: Insert release.qualifier data into release.yaml
      if: ${{ inputs.qualifier != '' }}
      working-directory: ${{ inputs.blueprint_path }}/devicefarms/gcp
      shell: bash
      env:
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
      run: yq e -i ".release.qualifier = strenv(INPUTS_QUALIFIER)" release.yaml

    - name: Generate Global Inputs global-inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/devicefarms/gcp
      shell: bash
      env:
        INPUTS_DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        INPUTS_QUALIFIER_SEPARATOR: ${{ inputs.qualifier != '' && '/' || '' }}
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        GCP_REGION: ${{ inputs.gcp_region }}
        GCP_PROJECT: ${{ inputs.gcp_project }}
        GCP_IMPERSONATE_SA: ${{ inputs.gcp_impersonate_sa }}
      run: |
        printf "%s\n" \
          "environment: ${INPUTS_DEPLOYMENT_NAME}${INPUTS_QUALIFIER_SEPARATOR}${INPUTS_QUALIFIER}" \
          "release_name: ${INPUTS_RELEASE_NAME}" \
          "default:" \
          "  region: ${GCP_REGION}" \
          "  project: ${GCP_PROJECT}" \
          "  impersonate_sa: ${GCP_IMPERSONATE_SA}" \
          > global-inputs.yaml

    - name: Determine Plan Action
      uses: actions/github-script@v8
      id: plan_action
      env:
        INPUTS_DESTROY: ${{ inputs.destroy }}
        INPUTS_UNLOCK: ${{ inputs.unlock }}
        INPUTS_LOCK_ID: ${{ inputs.lock_id }}
      with:
        script: |
          const is_destroy = ((process.env.INPUTS_DESTROY || '').toLowerCase() === 'true');
          const is_unlock = ((process.env.INPUTS_UNLOCK || '').toLowerCase() === 'true');
          if (is_destroy) {
            core.setOutput('value', 'plan -destroy -no-color -input=false')
            console.log('destroy');
          } else {
            if (is_unlock) {
              core.setOutput('value', 'force-unlock -force ' + (process.env.INPUTS_LOCK_ID || '') + '')
              console.log('unlock');
            } else {
              core.setOutput('value', 'plan -no-color -input=false')
              console.log('apply');
            }
          }

    - name: GCloud Session
      id: session
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.gcp_credentials }}
        project_id: ${{ inputs.gcp_project }}
        export_environment_variables: true

    - name: IOS Steps
      uses: cloudopsworks/blueprints/cd/deploy/mobile/gcp/ios@v5.10
      if: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) }}
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        token: ${{ inputs.token }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        qualifier: ${{ inputs.qualifier }}
        environment: ${{ inputs.environment }}
        artifacts_name: ${{ inputs.artifacts_name }}
        xcode_scheme: ${{ inputs.xcode_scheme }}
        xcode_sdk: ${{ inputs.xcode_sdk }}
        xcode_destination: ${{ inputs.xcode_destination }}
        test_script_available: ${{ steps.test_script_available.outputs.result }}
        run_test_type: ${{ steps.run_test_type.outputs.result }}

    - name: Android Steps
      uses: cloudopsworks/blueprints/cd/deploy/mobile/gcp/android@v5.10
      if: ${{ ! contains(fromJSON('["ios"]'), inputs.platform_type) }}
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        token: ${{ inputs.token }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        qualifier: ${{ inputs.qualifier }}
        environment: ${{ inputs.environment }}
        artifacts_name: ${{ inputs.artifacts_name }}
        android_sdk: ${{ inputs.android_sdk }}
        android_destination: ${{ inputs.android_destination }}
        android_configuration: ${{ inputs.android_configuration }}
        test_script_available: ${{ steps.test_script_available.outputs.result }}
        test_script_path: ${{ steps.test_script_path.outputs.result }}
        run_test_type: ${{ steps.run_test_type.outputs.result }}

    - name: Rename IPA/APK
      id: ipa_apk
      working-directory: ${{ inputs.blueprint_path }}/devicefarms/gcp/release
      shell: bash
      env:
        REL: ${{ inputs.release_name }}
        RELVER: ${{ inputs.release_version }}
        QUALI: ${{ inputs.qualifier != '' && '-' || '' }}${{ inputs.qualifier }}
        INPUTS_MOBILE_ARTIFACT_EXT: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ipa' || 'apk' }}
        INPUTS_DEVICEFARM_APP_TYPE: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'IOS_APP' || 'ANDROID_APP' }}
      run: |
        ext="${INPUTS_MOBILE_ARTIFACT_EXT}"
        app_type="${INPUTS_DEVICEFARM_APP_TYPE}"
        release=$(find . -type f -name "*.$ext" | head -n 1)
        if [[ -z "$release" ]]; then
          echo "::error::No .$ext artifact found under $(pwd)"
          find . -maxdepth 4 -type f | sort
          exit 1
        fi
        echo "Found: $release, moving to: ${REL}-${RELVER}${QUALI}.$ext"
        mv "$release" "${REL}-${RELVER}${QUALI}.$ext"
        echo "ext=$ext" >> $GITHUB_OUTPUT
        echo "app_type=$app_type" >> $GITHUB_OUTPUT

    - name: Device configuration
      id: device_config
      shell: bash
      working-directory: ${{ inputs.source_path }}
      env:
        INPUTS_MOBILE_PLATFORM: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ios' || 'android' }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        platform="${INPUTS_MOBILE_PLATFORM}"
        devices=$(yq e ".gcp.platforms.${platform}.devices[]? // .gcp.devices[]? | . as \$item | \"--device \\\"model=\" + \$item.model_id + (\$item.version_id // \"\" | select(length > 0) | \",version=\" + .) + (\$item.locale_id // \"\" | select(length > 0) | \",locale=\" + .) + (\$item.orientation // \"\" | select(length > 0) | \",orientation=\" + .) + \"\\\" \"" ".cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml" | tr '\n' ' ')
        echo "result=$devices" >> $GITHUB_OUTPUT

    - name: Schedule Run - Firebase Test Lab
      id: run_pool
      if: |
        ! cancelled() && 
        ( contains(fromJSON('["robo"]'), steps.run_test_type.outputs.result) ||
            steps.test_script_available.outputs.result == 'true' )
      working-directory: ${{ inputs.blueprint_path }}/devicefarms/gcp/release
      shell: bash
      env:
        REL: ${{ inputs.release_name }}
        RELVER: ${{ inputs.release_version }}
        QUALI: ${{ inputs.qualifier != '' && '-' || '' }}${{ inputs.qualifier }}
        INPUTS_MOBILE_PLATFORM: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && 'ios' || 'android' }}
        STEPS_IPA_APK_EXT: ${{ steps.ipa_apk.outputs.ext }}
        GCP_IMPERSONATE_SA: ${{ inputs.gcp_impersonate_sa }}
        STEPS_TEST_SCRIPT_AVAILABLE_RESULT: ${{ steps.test_script_available.outputs.result }}
        STEPS_DEVICE_CONFIG_RESULT: ${{ steps.device_config.outputs.result }}
        STEPS_RUN_TEST_TYPE_RESULT: ${{ steps.run_test_type.outputs.result }}
        INPUTS_XCODE_VERSION_ARG: ${{ contains(fromJSON('["ios"]'), inputs.platform_type) && format('--xcode-version={0}', inputs.xcode_version) || '' }}
        STEPS_RESULTS_BUCKET_OPTION_RESULT: ${{ steps.results_bucket_option.outputs.result }}
      run: |
        echo "::group::Schedule Run - Firebase Test Lab"
        target="${INPUTS_MOBILE_PLATFORM}"
        ext="${STEPS_IPA_APK_EXT}"
        if [[ "${STEPS_TEST_SCRIPT_AVAILABLE_RESULT}" == "true" ]]; then
          test_asset_arg="--test=${REL}-${RELVER}${QUALI}-tests.zip"
        else
          test_asset_arg="--app ${REL}-${RELVER}${QUALI}.${ext}"
        fi
        gcloud firebase test $target run \
          --impersonate-service-account="${GCP_IMPERSONATE_SA}" \
          "${test_asset_arg}" \
          "${STEPS_DEVICE_CONFIG_RESULT}" \
          --type="${STEPS_RUN_TEST_TYPE_RESULT}" "${INPUTS_XCODE_VERSION_ARG}" \
          --client-details=matrixLabel="${REL}-${RELVER}${QUALI}" "${STEPS_RESULTS_BUCKET_OPTION_RESULT}" \
          --async
        echo "::endgroup::"
