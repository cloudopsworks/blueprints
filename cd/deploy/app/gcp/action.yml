name: Deploy Application Google Cloud Platform
author: cloudopsworks
description: Deploy Application to Google Cloud Platform
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  token:
    description: 'The GitHub token'
    required: true
  cloud_type:
    description: 'The cloud type'
    required: true
  terraform_state_conf:
    description: 'The Terraform state configuration'
    required: true
  gcp_credentials:
    description: 'Google Cloud Credentials'
    required: true
  gcp_project:
    description: 'Google Cloud Project Name'
    required: true
  gcp_region:
    description: 'Google Cloud Region'
    required: true
  gcp_impersonate_sa:
    description: 'Google Cloud SA Impersonation account'
    required: true
  unlock:
    description: 'Unlock the state'
    required: false
    default: 'false'
  lock_id:
    description: 'The lock ID'
    required: false
    default: ''
  destroy:
    description: 'Destroy the state'
    required: false
    default: 'false'
  release_name:
    description: 'The release name'
    required: true
  release_version:
    description: 'The release version'
    required: true
  qualifier:
    description: 'The release qualifier'
    required: false
    default: ''
  project_key:
    description: 'The package name'
    required: true
  deployment_name:
    description: 'The deployment name'
    required: true
  environment:
    description: 'The environment'
    required: true
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  observability_enabled:
    description: 'The observability flag'
    required: false
    default: 'false'
  observability_agent:
    description: 'The observability agent'
    required: false
    default: 'datadog'
  front_end:
    description: 'The front end flag, used mainly for NodeJS targets'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: IAC Setup
      uses: cloudopsworks/blueprints/cd/deploy/common/iac@v5.10.45-beta.2
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        token: ${{ inputs.token }}

    - name: Copy configurations
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
      run: |
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/inputs.yaml"
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/"

    - name: Copy Values Bundle
      if: ${{ contains(fromJSON('["webapp","appengine"]'), inputs.cloud_type) }}
      shell: bash
      env:
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        mkdir -p "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/"
        if [ -d "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}" ] ; then
          cp -vpfR "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/." "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/"
        else
          echo "No values found for ${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/, skipping..."
          touch "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/.empty"
        fi

    - name: Create Hash value for values bundle
      id: hash_value
      if: ${{ contains(fromJSON('["webapp","appengine"]'), inputs.cloud_type) }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
      run: |
        hash=$(find values/ -type f -print0 | sort -z | xargs -0 sha1sum | sha1sum)
        echo "$hash" > ".values_hash_${INPUTS_RELEASE_NAME}"
        short_hash=$(echo $hash | cut -c1-10)
        echo "result=$short_hash" >> $GITHUB_OUTPUT

    - name: Copy Values Bundle
      if: ${{ contains(fromJSON('["kubernetes","k8s","gke"]'), inputs.cloud_type) }}
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
      run: |
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/helm/values-${INPUTS_ENVIRONMENT}.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/helm-values.yaml"
        mkdir -p "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/"
        if [ -d "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}" ]; then
          cp -vpfR "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/." "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/"
        else
          echo "No values found for ${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/, skipping..."
          touch "${INPUTS_BLUEPRINT_PATH}/terraform/gcp/${INPUTS_CLOUD_TYPE}/values/.empty"
        fi

    - name: Generate release.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        INPUTS_PROJECT_KEY: ${{ inputs.project_key }}
        INPUTS_RELEASE_VERSION: ${{ inputs.release_version }}
        INPUTS_FRONTEND_ENV_SUFFIX: ${{ inputs.front_end == 'true' && format('-{0}', inputs.environment) || '' }}
      run: |
        printf "%s\n" \
          "release:" \
          "  name: ${INPUTS_RELEASE_NAME}" \
          "  source:" \
          "    name: ${INPUTS_PROJECT_KEY}" \
          "    version: ${INPUTS_RELEASE_VERSION}${INPUTS_FRONTEND_ENV_SUFFIX}" \
          > release.yaml

    - name: Insert release.qualifier data into release.yaml
      if: ${{ inputs.qualifier != '' }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
      run: yq e -i ".release.qualifier = strenv(INPUTS_QUALIFIER)" release.yaml

    - name: Insert bucket name & bucket path for beanstalk & lambda
      if: ${{ contains(fromJSON('["webapp","appengine"]'), inputs.cloud_type) }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        INPUTS_RELEASE_VERSION: ${{ inputs.release_version }}
        STEPS_HASH_VALUE_RESULT: ${{ steps.hash_value.outputs.result }}
      run: |
        BUCKET_PATH="${INPUTS_RELEASE_NAME}/${INPUTS_RELEASE_VERSION}/${INPUTS_RELEASE_NAME}-${INPUTS_RELEASE_VERSION}-${STEPS_HASH_VALUE_RESULT}.zip"
        VERSION_LABEL="${INPUTS_RELEASE_VERSION}-${STEPS_HASH_VALUE_RESULT}"
        BUCKET_PATH="${BUCKET_PATH}" yq e -i ".bucket_path = strenv(BUCKET_PATH)" release.yaml
        VERSION_LABEL="${VERSION_LABEL}" yq e -i ".version_label = strenv(VERSION_LABEL)" release.yaml

    - name: Generate Global Inputs global-inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp
      shell: bash
      env:
        INPUTS_DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        INPUTS_QUALIFIER_SEPARATOR: ${{ inputs.qualifier != '' && '/' || '' }}
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        GCP_REGION: ${{ inputs.gcp_region }}
        GCP_PROJECT: ${{ inputs.gcp_project }}
        GCP_IMPERSONATE_SA: ${{ inputs.gcp_impersonate_sa }}
      run: |
        printf "%s\n" \
          "environment: ${INPUTS_DEPLOYMENT_NAME}${INPUTS_QUALIFIER_SEPARATOR}${INPUTS_QUALIFIER}" \
          "release_name: ${INPUTS_RELEASE_NAME}" \
          "default:" \
          "  region: ${GCP_REGION}" \
          "  project: ${GCP_PROJECT}" \
          "  impersonate_sa: ${GCP_IMPERSONATE_SA}" \
          > global-inputs.yaml

    - name: Generate Observability configuration for datadog
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'datadog' }}
      uses: ./bp/cd/deploy/app/observability/datadog
      with:
        blueprint_path: ${{ inputs.blueprint_path }}
        source_path: ${{ inputs.source_path }}
        cloud: 'gcp'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        deployment_name: ${{ inputs.deployment_name }}
        environment: ${{ inputs.environment }}

    - name: Generate state_conf.yaml from vars.DEPLOYMENT_STATE_CONF
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp
      shell: bash
      env:
        INPUTS_TERRAFORM_STATE_CONF: ${{ inputs.terraform_state_conf }}
      run: |
        printf "%s\n" "${INPUTS_TERRAFORM_STATE_CONF}" > state_conf.yaml

    - name: Determine Plan Action
      uses: actions/github-script@v8
      id: plan_action
      env:
        INPUTS_DESTROY: ${{ inputs.destroy }}
        INPUTS_UNLOCK: ${{ inputs.unlock }}
        INPUTS_LOCK_ID: ${{ inputs.lock_id }}
      with:
        script: |
          const is_destroy = ((process.env.INPUTS_DESTROY || '').toLowerCase() === 'true');
          const is_unlock = ((process.env.INPUTS_UNLOCK || '').toLowerCase() === 'true');
          if (is_destroy) {
            core.setOutput('value', 'plan -destroy -no-color -input=false')
            console.log('destroy');
          } else {
            if (is_unlock) {
              core.setOutput('value', 'force-unlock -force ' + (process.env.INPUTS_LOCK_ID || '') + '')
              console.log('unlock');
            } else {
              core.setOutput('value', 'plan -no-color -input=false')
              console.log('apply');
            }
          }

    - name: Terragrunt Plan
      id: plan
      if: ${{ ! cancelled() }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      shell: bash
      env:
        STEPS_PLAN_ACTION_VALUE: ${{ steps.plan_action.outputs.value }}
        TG_TF_PATH: tofu
        GOOGLE_CREDENTIALS: ${{ inputs.gcp_credentials }}
        HELM_CREDS_USER: '_json_key'
        HELM_CREDS_PASSWORD: ${{ inputs.gcp_credentials }}
        HELM_EXPERIMENTAL_OCI: "1"
        GITHUB_API_TOKEN: ${{ inputs.token }}
      run: |
        echo "::group::Terragrunt Plan"
        terragrunt --non-interactive run -- ${STEPS_PLAN_ACTION_VALUE}
        echo "::endgroup::"
    - name: Terragrunt Plan to JSON
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::Terragrunt Plan to JSON"
        terragrunt --non-interactive run -- show -json plan.tfplan > tfplan.json
        echo "::endgroup::"
      env:
        TG_TF_PATH: tofu
        GOOGLE_CREDENTIALS: ${{ inputs.gcp_credentials }}
        GITHUB_API_TOKEN: ${{ inputs.token }}

    - name: TF Summarize of JSON file
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::TF Summarize of JSON file"
        tf-summarize tfplan.json
        echo "::endgroup::"

    - name: Save Plan Artifacts
      if: ${{ inputs.unlock != 'true' && inputs.destroy != 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifacts_name }}_iac
        retention-days: 1
        overwrite: true
        path: |
          ${{ inputs.blueprint_path }}/terraform/gcp/**
          !**/.terragrunt-cache/**
          !**/.terraform/**

    - name: Restore Pipeline Artifacts
      uses: actions/download-artifact@v7
      if: ${{ inputs.artifacts_name != '' && inputs.unlock != 'true' && inputs.destroy != 'true' }}
      with:
        name: ${{ inputs.artifacts_name }}
        path: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}/release

    - name: Generate Bundle ZipFile - Upload GCP Bucket
      if: ${{ contains(fromJSON('["webapp","appengine"]'), inputs.cloud_type) && inputs.unlock != 'true' && inputs.destroy != 'true' }}
      id: bundle
      uses: ./bp/cd/deploy/app/pack
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        cloud: 'gcp'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        gcp_credentials: ${{ inputs.gcp_credentials }}
        gcp_impersonate_sa: ${{ inputs.gcp_impersonate_sa }}
        gcp_project: ${{ inputs.gcp_project }}
        environment: ${{ inputs.environment }}
        gcp_region: ${{ inputs.gcp_region }}
        observability_enabled: ${{ inputs.observability_enabled }}
        observability_agent: ${{ inputs.observability_agent }}

    - name: Validate Bundle Outcome
      if: ${{ ( contains(fromJSON('["beanstalk","lambda"]'), inputs.cloud_type) && inputs.unlock != 'true' && inputs.destroy != 'true') && steps.bundle.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::error::Bundle creation failed, please check the logs for details."
        exit 1

    - name: Terragrunt Apply
      id: apply
      working-directory: ${{ inputs.blueprint_path }}/terraform/gcp/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && ! cancelled() && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::Terragrunt Apply"
        terragrunt --non-interactive run -- apply -no-color plan.tfplan
        echo "::endgroup::"
      continue-on-error: false
      env:
        TG_TF_PATH: tofu
        GOOGLE_CREDENTIALS: ${{ inputs.gcp_credentials }}
        HELM_CREDS_USER: '_json_key'
        HELM_CREDS_PASSWORD: ${{ inputs.gcp_credentials }}
        HELM_EXPERIMENTAL_OCI: "1"
        GITHUB_API_TOKEN: ${{ inputs.token }}
