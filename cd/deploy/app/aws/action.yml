name: Deploy Application AWS
author: cloudopsworks
description: Deploy Application to AWS
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  token:
    description: 'The GitHub token'
    required: true
  cloud_type:
    description: 'The cloud type'
    required: true
  aws_region:
    description: 'The AWS region'
    required: true
  aws_sts_role_arn:
    description: 'The AWS STS Role ARN'
    required: true
  aws_access_key_id:
    description: 'The AWS access key ID'
    required: true
  aws_secret_access_key:
    description: 'The AWS secret access key'
    required: true
  terraform_state_conf:
    description: 'The Terraform state configuration'
    required: true
  unlock:
    description: 'Unlock the state'
    required: false
    default: 'false'
  lock_id:
    description: 'The lock ID'
    required: false
    default: ''
  destroy:
    description: 'Destroy the state'
    required: false
    default: 'false'
  release_name:
    description: 'The release name'
    required: true
  release_version:
    description: 'The release version'
    required: true
  qualifier:
    description: 'The release qualifier'
    required: false
    default: ''
  project_key:
    description: 'The package name'
    required: true
  deployment_name:
    description: 'The deployment name'
    required: true
  environment:
    description: 'The environment'
    required: true
  artifacts_name:
    description: 'The name of the artifacts to save'
    required: false
    default: 'build_artifacts'
  observability_enabled:
    description: 'The observability flag'
    required: false
    default: 'false'
  observability_agent:
    description: 'The observability agent'
    required: false
    default: 'xray'
  front_end:
    description: 'The front end flag, used mainly for NodeJS targets'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: IAC Setup
      uses: cloudopsworks/blueprints/cd/deploy/common/iac@v5.10
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        token: ${{ inputs.token }}

    - name: Copy configurations
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
      run: |
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-${INPUTS_ENVIRONMENT}.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/inputs.yaml"
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/inputs-global.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/"

    - name: Copy Values Bundle
      if: ${{ contains(fromJSON('["beanstalk","lambda","s3","storage"]'), inputs.cloud_type) }}
      shell: bash
      env:
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        mkdir -p "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/"
        if [ -d "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}" ] ; then
          cp -vpfR "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/." "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/"
        else
          echo "No values found for ${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/, skipping..."
          touch "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/.empty"
        fi

    - name: Create Hash value for values bundle
      id: hash_value
      if: ${{ contains(fromJSON('["beanstalk","lambda","s3","storage"]'), inputs.cloud_type) }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
      run: |
        hash=$(find values/ -type f -print0 | sort -z | xargs -0 sha1sum | sha1sum)
        echo "$hash" > .values_hash_"${INPUTS_RELEASE_NAME}"
        short_hash=$(echo $hash | cut -c1-10)
        echo "result=$short_hash" >> $GITHUB_OUTPUT

    - name: Copy Values Bundle
      if: ${{ contains(fromJSON('["kubernetes","k8s","eks"]'), inputs.cloud_type) }}
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
        INPUTS_ENVIRONMENT: ${{ inputs.environment }}
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
      run: |
        cp -pf "${INPUTS_SOURCE_PATH}/.cloudopsworks/vars/helm/values-${INPUTS_ENVIRONMENT}.yaml" "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/helm-values.yaml"
        mkdir -p "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/"
        if [ -d "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}" ]; then
          cp -vpfR "${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/." "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/"
        else
          echo "No values found for ${INPUTS_SOURCE_PATH}/.cloudopsworks/values/${INPUTS_ENVIRONMENT}/, skipping..."
          touch "${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/values/.empty"
        fi

    - name: Generate release.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        INPUTS_PROJECT_KEY: ${{ inputs.project_key }}
        INPUTS_RELEASE_VERSION: ${{ inputs.release_version }}
        INPUTS_FRONTEND_ENV_SUFFIX: ${{ inputs.front_end == 'true' && format('-{0}', inputs.environment) || '' }}
      run: |
        printf "%s\n" \
          "release:" \
          "  name: ${INPUTS_RELEASE_NAME}" \
          "  source:" \
          "    name: ${INPUTS_PROJECT_KEY}" \
          "    version: ${INPUTS_RELEASE_VERSION}${INPUTS_FRONTEND_ENV_SUFFIX}" \
          > release.yaml

    - name: Insert release.qualifier data into release.yaml
      if: ${{ inputs.qualifier != '' }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
      run: yq e -i ".release.qualifier = strenv(INPUTS_QUALIFIER)" release.yaml

    - name: Insert bucket name & bucket path for beanstalk & lambda
      if: ${{ contains(fromJSON('["beanstalk","lambda"]'), inputs.cloud_type) }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        INPUTS_RELEASE_VERSION: ${{ inputs.release_version }}
        STEPS_HASH_VALUE_RESULT: ${{ steps.hash_value.outputs.result }}
      run: |
        BUCKET_PATH="${INPUTS_RELEASE_NAME}/${INPUTS_RELEASE_VERSION}/${INPUTS_RELEASE_NAME}-${INPUTS_RELEASE_VERSION}-${STEPS_HASH_VALUE_RESULT}.zip"
        VERSION_LABEL="${INPUTS_RELEASE_NAME}-${INPUTS_RELEASE_VERSION}-${STEPS_HASH_VALUE_RESULT}"
        BUCKET_PATH="${BUCKET_PATH}" yq e -i ".bucket_path = strenv(BUCKET_PATH)" release.yaml
        VERSION_LABEL="${VERSION_LABEL}" yq e -i ".version_label = strenv(VERSION_LABEL)" release.yaml

    - name: Insert release path directly into release.yaml - S3/Storage
      if: ${{ contains(fromJSON('["s3","storage"]'), inputs.cloud_type) }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
        INPUTS_BLUEPRINT_PATH: ${{ inputs.blueprint_path }}
        INPUTS_CLOUD_TYPE: ${{ inputs.cloud_type }}
      run: |
        RELEASE_PATH="${GITHUB_WORKSPACE}/${INPUTS_BLUEPRINT_PATH}/terraform/aws/${INPUTS_CLOUD_TYPE}/release/"
        RELEASE_PATH="${RELEASE_PATH}" yq e -i ".release_path = strenv(RELEASE_PATH)" release.yaml

    - name: Generate Global Inputs global-inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws
      shell: bash
      env:
        INPUTS_DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        INPUTS_QUALIFIER_SEPARATOR: ${{ inputs.qualifier != '' && '/' || '' }}
        INPUTS_QUALIFIER: ${{ inputs.qualifier }}
        INPUTS_RELEASE_NAME: ${{ inputs.release_name }}
        AWS_REGION: ${{ inputs.aws_region }}
        AWS_STS_ROLE_ARN: ${{ inputs.aws_sts_role_arn }}
      run: |
        printf "%s\n" \
          "environment: ${INPUTS_DEPLOYMENT_NAME}${INPUTS_QUALIFIER_SEPARATOR}${INPUTS_QUALIFIER}" \
          "release_name: ${INPUTS_RELEASE_NAME}" \
          "default:" \
          "  region: ${AWS_REGION}" \
          "  sts_role_arn: ${AWS_STS_ROLE_ARN}" \
          > global-inputs.yaml

    - name: Generate Observability configuration for Xray
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'xray' }}
      uses: ./bp/cd/deploy/app/observability/xray
      with:
        blueprint_path: ${{ inputs.blueprint_path }}
        source_path: ${{ inputs.source_path }}
        cloud: 'aws'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        deployment_name: ${{ inputs.deployment_name }}x
        environment: ${{ inputs.environment }}

    - name: Generate Observability configuration for datadog
      if: ${{ inputs.observability_enabled == 'true' && inputs.observability_agent == 'datadog' }}
      uses: ./bp/cd/deploy/app/observability/datadog
      with:
        blueprint_path: ${{ inputs.blueprint_path }}
        source_path: ${{ inputs.source_path }}
        cloud: 'aws'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        deployment_name: ${{ inputs.deployment_name }}
        environment: ${{ inputs.environment }}

    - name: Generate state_conf.yaml from vars.DEPLOYMENT_STATE_CONF
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws
      shell: bash
      env:
        INPUTS_TERRAFORM_STATE_CONF: ${{ inputs.terraform_state_conf }}
      run: |
        printf "%s\n" "${INPUTS_TERRAFORM_STATE_CONF}" > state_conf.yaml

    - name: Determine Plan Action
      uses: actions/github-script@v8
      id: plan_action
      env:
        INPUTS_DESTROY: ${{ inputs.destroy }}
        INPUTS_UNLOCK: ${{ inputs.unlock }}
        INPUTS_LOCK_ID: ${{ inputs.lock_id }}
      with:
        script: |
          const is_destroy = ((process.env.INPUTS_DESTROY || '').toLowerCase() === 'true');
          const is_unlock = ((process.env.INPUTS_UNLOCK || '').toLowerCase() === 'true');
          if (is_destroy) {
            core.setOutput('value', 'plan -destroy -no-color -input=false')
            console.log('destroy');
          } else {
            if (is_unlock) {
              core.setOutput('value', 'force-unlock -force ' + (process.env.INPUTS_LOCK_ID || '') + '')
              console.log('unlock');
            } else {
              core.setOutput('value', 'plan -no-color -input=false')
              console.log('apply');
            }
          }

    - name: Generate Bundle - Only Frontend on Storage/Bucket
      if: ${{ contains(fromJSON('["s3","storage"]'), inputs.cloud_type) && inputs.unlock != 'true' && inputs.destroy != 'true' && inputs.front_end == 'true' }}
      id: bundle_storage
      uses: ./bp/cd/deploy/app/pack
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        cloud: 'aws'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        aws_access_key_id: ${{ inputs.aws_access_key_id }}
        aws_secret_access_key: ${{ inputs.aws_secret_access_key }}
        aws_sts_role_arn: ${{ inputs.aws_sts_role_arn }}
        environment: ${{ inputs.environment }}
        aws_region: ${{ inputs.aws_region }}
        observability_enabled: ${{ inputs.observability_enabled }}
        observability_agent: ${{ inputs.observability_agent }}

    - name: Restore Pipeline Artifacts - Only FrontEnd
      uses: actions/download-artifact@v7
      if: ${{ inputs.artifacts_name != '' && inputs.unlock != 'true' && inputs.destroy != 'true' && inputs.front_end == 'true' }}
      with:
        name: ${{ inputs.artifacts_name }}
        path: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}/release

    - name: Terragrunt Plan
      id: plan
      if: ${{ ! cancelled() }}
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      shell: bash
      env:
        STEPS_PLAN_ACTION_VALUE: ${{ steps.plan_action.outputs.value }}
        TG_TF_PATH: tofu
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        HELM_CREDS_USER: ${{ inputs.aws_access_key_id }}
        HELM_CREDS_PASSWORD: ${{ inputs.aws_secret_access_key }}
        HELM_EXPERIMENTAL_OCI: "1"
        GITHUB_API_TOKEN: ${{ inputs.token }}
      run: |
        echo "::group::Terragrunt Plan"
        terragrunt --non-interactive run -- ${STEPS_PLAN_ACTION_VALUE}
        echo "::endgroup::"

    - name: Terragrunt Plan to JSON
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::Terragrunt Plan to JSON"
        terragrunt --non-interactive run -- show -json plan.tfplan > tfplan.json
        echo "::endgroup::"
      env:
        TG_TF_PATH: tofu
        AWS_ACCESS_KEY_ID: ${INPUTS_AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY: ${INPUTS_AWS_SECRET_ACCESS_KEY}
        GITHUB_API_TOKEN: ${INPUTS_TOKEN}

        INPUTS_AWS_ACCESS_KEY_ID: ${INPUTS_AWS_ACCESS_KEY_ID}
        INPUTS_AWS_SECRET_ACCESS_KEY: ${INPUTS_AWS_SECRET_ACCESS_KEY}
        INPUTS_TOKEN: ${INPUTS_TOKEN}
    - name: TF Summarize of JSON file
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::TF Summarize of JSON file"
        tf-summarize tfplan.json
        echo "::endgroup::"

    - name: Save Plan Artifacts
      if: ${{ inputs.unlock != 'true' && inputs.destroy != 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifacts_name }}_iac
        retention-days: 1
        overwrite: true
        path: |
          ${{ inputs.blueprint_path }}/terraform/aws/**
          !**/.terragrunt-cache/**
          !**/.terraform/**

    - name: Restore Pipeline Artifacts
      uses: actions/download-artifact@v7
      if: ${{ inputs.artifacts_name != '' && inputs.unlock != 'true' && inputs.destroy != 'true' && inputs.front_end != 'true' }}
      with:
        name: ${{ inputs.artifacts_name }}
        path: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}/release

    - name: Generate Bundle ZipFile - Upload S3
      if: ${{ contains(fromJSON('["beanstalk","lambda"]'), inputs.cloud_type) && inputs.unlock != 'true' && inputs.destroy != 'true' }}
      id: bundle
      uses: ./bp/cd/deploy/app/pack
      with:
        source_path: ${{ inputs.source_path }}
        blueprint_path: ${{ inputs.blueprint_path }}
        cloud: 'aws'
        cloud_type: ${{ inputs.cloud_type }}
        release_name: ${{ inputs.release_name }}
        release_version: ${{ inputs.release_version }}
        project_key: ${{ inputs.project_key }}
        aws_access_key_id: ${{ inputs.aws_access_key_id }}
        aws_secret_access_key: ${{ inputs.aws_secret_access_key }}
        aws_sts_role_arn: ${{ inputs.aws_sts_role_arn }}
        environment: ${{ inputs.environment }}
        aws_region: ${{ inputs.aws_region }}
        observability_enabled: ${{ inputs.observability_enabled }}
        observability_agent: ${{ inputs.observability_agent }}

    - name: Validate Bundle Outcome
      if: ${{ ( contains(fromJSON('["beanstalk","lambda"]'), inputs.cloud_type) && inputs.unlock != 'true' && inputs.destroy != 'true') && steps.bundle.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::error::Bundle creation failed, please check the logs for details."
        exit 1

    - name: Terragrunt Apply
      id: apply
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/${{ inputs.cloud_type }}
      if: ${{ inputs.unlock != 'true' && ! cancelled() && steps.plan.outcome == 'success' }}
      shell: bash
      run: |
        echo "::group::Terragrunt Apply"
        terragrunt --non-interactive run -- apply -no-color plan.tfplan
        echo "::endgroup::"
      continue-on-error: false
      env:
        TG_TF_PATH: tofu
        AWS_ACCESS_KEY_ID: ${INPUTS_AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY: ${INPUTS_AWS_SECRET_ACCESS_KEY}
        HELM_CREDS_USER: ${INPUTS_AWS_ACCESS_KEY_ID}
        HELM_CREDS_PASSWORD: ${INPUTS_AWS_SECRET_ACCESS_KEY}
        HELM_EXPERIMENTAL_OCI: "1"
        GITHUB_API_TOKEN: ${INPUTS_TOKEN}

        INPUTS_AWS_ACCESS_KEY_ID: ${INPUTS_AWS_ACCESS_KEY_ID}
        INPUTS_AWS_SECRET_ACCESS_KEY: ${INPUTS_AWS_SECRET_ACCESS_KEY}
        INPUTS_TOKEN: ${INPUTS_TOKEN}
    - name: Hard fail on plan error
      shell: bash
      if: ${{ steps.plan.outcome != 'success' && ! cancelled() }}
      continue-on-error: false
      run: |
        echo "::error::Terragrunt plan failed, exiting!!!"
        exit 1

    - name: Hard fail on apply error
      shell: bash
      if: ${{ steps.apply.outcome != 'success' && inputs.unlock != 'true' && ! cancelled() }}
      continue-on-error: false
      run: |
        echo "::error::Terragrunt apply failed, exiting!!!"
        exit 1
