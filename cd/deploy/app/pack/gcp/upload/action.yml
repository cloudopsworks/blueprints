name: Procfile creation for ElasticBeanstalk
author: cloudopsworks
description: Create Procfile for ElasticBeanstalk
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  gcp_credentials:
    description: 'Google Cloud Credentials'
    required: true
  gcp_project:
    description: 'Google Cloud Project Name'
    required: true
  gcp_region:
    description: 'Google Cloud Region'
    required: true
  gcp_impersonate_sa:
    description: 'Google Cloud SA Impersonation account'
    required: true
  temp_dir:
    description: 'The temporary working directory'
    required: true
  dest_zip:
    description: 'The destination zip file'
    required: true
  versions_bucket:
    description: 'The S3 bucket for versions'
    required: true
  bucket_path:
    description: 'The S3 bucket path'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Google Authorization
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.gcp_project }}
        credentials_json: ${{ inputs.gcp_credentials }}

    - name: Upload to Cloud Storage
      working-directory: ${{ inputs.temp_dir }}
      shell: bash
      env:
        GCP_IMPERSONATE_SA: ${{ inputs.gcp_impersonate_sa }}
        INPUTS_DEST_ZIP: ${{ inputs.dest_zip }}
        INPUTS_VERSIONS_BUCKET: ${{ inputs.versions_bucket }}
        INPUTS_BUCKET_PATH: ${{ inputs.bucket_path }}
      run: |
        echo "::group::Uploading to GCP Cloud Storage"
        gcloud storage cp --impersonate-service-account="${GCP_IMPERSONATE_SA}" "${INPUTS_DEST_ZIP}" "gs://${INPUTS_VERSIONS_BUCKET}/${INPUTS_BUCKET_PATH}"
        echo "::endgroup::"
