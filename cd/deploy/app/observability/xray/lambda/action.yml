name: Xray Observability deployment setup for HELM
author: cloudopsworks
description: Xray Observability deployment setup for HELM chart
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  cloud:
    description: 'The cloud'
    required: true
  release_name:
    description: 'The release name'
    required: true
  release_version:
    description: 'The release version'
    required: true
  project_key:
    description: 'The package name'
    required: true
  deployment_name:
    description: 'The deployment name'
    required: true
  environment:
    description: 'The environment'
    required: true

runs:
  using: 'composite'
  steps:
    - name: extract aws.region from inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/lambda
      id: aws_region
      shell: bash
      run: |
        result=$(yq e ".aws.region // \"us-east-1\"" inputs.yaml)
        printf 'result=%s\n' "${result}" >> "${GITHUB_OUTPUT}"

    - name: extract lambda architecture from inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/lambda
      id: arch
      shell: bash
      run: |
        larch=$(yq e '.lambda.arch // "x86_64"' inputs.yaml)
        arch=
        if [ "$larch" == "x86_64" ]; then
          arch="amd64"
        else
          arch="arm64"
        fi
        echo "::debug::result=$arch"
        echo "result=$arch" >> $GITHUB_OUTPUT

    - name: extract lambda runtime from inputs.yaml
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/lambda
      id: runtime
      shell: bash
      env:
        STEPS_AWS_REGION_RESULT: ${{ steps.aws_region.outputs.result }}
        STEPS_ARCH_RESULT: ${{ steps.arch.outputs.result }}
      run: |
        lruntime=$(yq e '.lambda.runtime // ""' inputs.yaml)
        runtime=
        wrapper=
        if [[ "$lruntime" =~ node* ]]; then
          runtime=$(yq e ".nodejs[strenv(STEPS_AWS_REGION_RESULT)]" observability.yaml)
          wrapper="/opt/otel-instrument"
        elif [[ "$lruntime" =~ python* ]]; then
          runtime=$(yq e ".python[strenv(STEPS_AWS_REGION_RESULT)]" observability.yaml)
          wrapper="/opt/otel-instrument"
        elif [[ "$lruntime" =~ java* ]]; then
          runtime="aws-otel-java-agent-${STEPS_ARCH_RESULT}-ver-1-32-0:4"
          wrapper="/opt/otel-handler"
        fi
        echo "::debug::result=$runtime"
        echo "result=$runtime" >> $GITHUB_OUTPUT
        echo "wrapper=$wrapper" >> $GITHUB_OUTPUT

    - name: Xray/OTEL variable Injection
      working-directory: ${{ inputs.blueprint_path }}/terraform/aws/lambda
      id: xray_inject
      shell: bash
      env:
        STEPS_RUNTIME_RESULT: ${{ steps.runtime.outputs.result }}
        STEPS_RUNTIME_WRAPPER: ${{ steps.runtime.outputs.wrapper }}
      run: |
        echo "::group::Xray/OTEL variable Injection"
        yq e -i '.lambda.layers += [{"arn": strenv(STEPS_RUNTIME_RESULT)}]' inputs.yaml
        yq e -i '.lambda.environment.variables += [{"name":"AWS_LAMBDA_EXEC_WRAPPER","value": strenv(STEPS_RUNTIME_WRAPPER)}]' inputs.yaml
        yq e -i '.lambda.iam.enabled = true' inputs.yaml
        yq e -i '.lambda.iam.policy_attachments += [{"arn":"arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess"},{"arn":"arn:aws:iam::aws:policy/CloudWatchLambdaApplicationSignalsExecutionRolePolicy"}]' inputs.yaml
        yq e -i '.lambda.tracing.enabled = true' inputs.yaml
        yq e -i '.lambda.tracing.mode = "Active"' inputs.yaml
        echo "inputs.yaml:"
        cat inputs.yaml
        echo "::endgroup::"
