name: Check and label Pull Requests
author: cloudopsworks
description: This action checks the Pull Request and labels it
inputs:
  source_path:
    description: 'The path to the source code'
    required: false
    default: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    required: false
    default: 'bp'
  token:
    description: 'The Github token'
    required: true

runs:
  using: 'composite'
  steps:
    - uses: actions/labeler@v6
      with:
        repo-token: ${{ inputs.token }}
        configuration-path: '${{ inputs.source_path }}/.cloudopsworks/labeler.yml'

    - name: test
      shell: bash
      env:
        GITHUB_REF: ${{ github.ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
      run: |
        echo "REF=${GITHUB_REF}"
        echo "REF_NAME=${GITHUB_REF_NAME}"
        echo "HEAD_REF=${GITHUB_HEAD_REF}"
        echo "BASE_REF=${GITHUB_BASE_REF}"

    - name: Get Automatic Environment
      id: check_automatic
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".cd.automatic" "${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Reviewers count
      id: reviewers_count
      shell: bash
      env:
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e ".config.requiredReviewers" "${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Get Reviewers list
      id: reviewers
      shell: bash
      env:
        GITHUB_EVENT_PULL_REQUEST_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        INPUTS_SOURCE_PATH: ${{ inputs.source_path }}
      run: |
        RET=$(yq e -o=json -I=0 "[.config.reviewers[] | select(. != strenv(GITHUB_EVENT_PULL_REQUEST_USER_LOGIN)) ]" "${INPUTS_SOURCE_PATH}/.cloudopsworks/cloudopsworks-ci.yaml")
        {
          echo "result<<EOF"
          echo "${RET}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
    - name: Assign Milestone to the PR
      uses: actions/github-script@v8
      if: ${{ startsWith(github.head_ref,'release/') }}
      env:
        GITHUB_HEAD_REF: ${{ github.head_ref }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          // Retrieve the list of github milestones, add the milestone that matches with rel_name to the PR only
          // if the milestone does exist, if the milestone does not exist, create it and add it to the PR
          const rel_name = '' + (process.env.GITHUB_HEAD_REF || '') + '';
          const rel_version = rel_name.replace('release/','');
          
          const { data: mil_list } = await github.rest.issues.listMilestones({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'all',
            direction: 'desc',
            per_page: 100
          });
          var mil_number = 0;
          for ( const mil of mil_list ) {
            if ( mil.title === rel_version ) {
              mil_number = mil.number;
              core.info(`Found matching milestone: ${mil.title}`);
              break;
            }
          }
          if ( mil_number == 0 ) {
            const mil = await github.rest.issues.createMilestone({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: rel_version
            });
            mil_number = mil.data.number;
          }
          github.rest.issues.update({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            milestone: mil_number
          });

    - uses: actions/github-script@v8
      if: ${{ steps.check_automatic.outputs.result == 'true' || (github.base_ref == 'develop' && startsWith(github.head_ref,'release/')) }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          // Set the approved labels and the automatic-environment label
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['approved', 'automatic-environment']
          });

    - uses: actions/github-script@v8
      if: ${{ steps.check_automatic.outputs.result != 'true' && ! (github.base_ref == 'develop' && startsWith(github.head_ref,'release/')) }}
      env:
        STEPS_REVIEWERS_RESULT: ${{ steps.reviewers.outputs.result }}
        STEPS_REVIEWERS_COUNT_RESULT: ${{ steps.reviewers_count.outputs.result }}
        GITHUB_EVENT_PULL_REQUEST_USER_LOGIN: ${{ github.event.pull_request.user.login }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const reviewers_json=JSON.parse('' + (process.env.STEPS_REVIEWERS_RESULT || '') + '')
          const reviewers_count=(process.env.STEPS_REVIEWERS_COUNT_RESULT || '')
          const actor = '' + (process.env.GITHUB_EVENT_PULL_REQUEST_USER_LOGIN || '') + ''
          
          var reviewers = []
          for ( const rev of reviewers_json ) {
            if ( actor !== rev ) {
              reviewers.push(rev)
            }
          }
          
          github.rest.pulls.requestReviewers({
            pull_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            reviewers: reviewers
          })
          
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['approval-required','review-required']
          })
