name: Release Workflow for Github
author: cloudopsworks
description: Release Workflow for Github
inputs:
  source_path:
    description: 'The path to the source code'
    value: 'source'
  blueprint_path:
    description: 'The path to the blueprint'
    value: 'bp'
  ref_name:
    description: 'The reference name'
    required: true
  release_tag:
    description: 'The release tag'
    required: true
  is_pre_release:
    description: 'The pre-release flag'
    required: false
    default: 'false'
  go_releaser_inuse:
    description: 'Whether goreleaser is in action or not, if true, the release will be created as draft, final publishing should be done by goreleaser, if false, the release will be published immediately'
    required: false
    default: 'false'
  files_globs:
    description: 'The files globs to include in the release'
    required: false
    default: |
        target/*.zip
        target/*.tgz
  token:
    description: 'The github token to use for the release'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Normalize version Tag
      id: normalize
      uses: actions/github-script@v8
      env:
        INPUTS_RELEASE_TAG: ${{ inputs.release_tag }}
      with:
        result-encoding: string
        script: |
          const relTag = '' + (process.env.INPUTS_RELEASE_TAG || '') + ''
          var release = relTag;
          if ( !relTag.startsWith('v') ) {
            release = 'v' + relTag; 
          }
          return release;

    # Changelog generation
    - name: Get previous tag
      working-directory: ${{ inputs.source_path }}
      id: previous_tag
      shell: bash
      env:
        STEPS_NORMALIZE_RESULT: ${{ steps.normalize.outputs.result }}
      run: |
        pwd
        name=$(git --no-pager tag --sort=creatordate --merged "${STEPS_NORMALIZE_RESULT}" | egrep "v[0-9]+\.[0-9]+\.[0-9]+$" | awk '{lines[NR]=$0} END{if(NR>1) print lines[NR-1]}')
        echo "previousTag: $name"
        echo "tag=$name" >> $GITHUB_OUTPUT

    - name: Changelog Generation
      uses: cloudopsworks/changelog-action@v1
      id: changelog
      if: ${{ steps.previous_tag.outputs.tag == '' }}
      with:
        token: ${{ inputs.token }}
        working_dir: ./${{ inputs.source_path }}/
        tag: ${{ steps.normalize.outputs.result }}
        writeToFile: true

    - name: Changelog Generation
      uses: cloudopsworks/changelog-action@v1
      id: changelog-from-to
      if: ${{ steps.previous_tag.outputs.tag != '' }}
      with:
        token: ${{ inputs.token }}
        working_dir: ./${{ inputs.source_path }}/
        fromTag: ${{ steps.normalize.outputs.result }}
        toTag: ${{ steps.previous_tag.outputs.tag }}
        writeToFile: true

    - name: Upload artifact to workflow run
      uses: actions/upload-artifact@v7
      with:
        name: changelog
        retention-days: 1
        overwrite: true
        path: ${{ inputs.source_path }}/CHANGELOG.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        token: ${{ inputs.token }}
        body: ${{ steps.changelog.outputs.changes != '' && steps.changelog.outputs.changes || steps.changelog-from-to.outputs.changes }}
        name: "Release ${{ steps.normalize.outputs.result }}"
        tag_name: ${{ steps.normalize.outputs.result }}
        prerelease: ${{ inputs.is_pre_release }}
        draft: ${{ inputs.go_releaser_inuse == 'true' }}
        files: ${{ inputs.files_globs }}
